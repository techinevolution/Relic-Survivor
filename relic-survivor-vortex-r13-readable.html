<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Relic Survivor — Vortex r13 (Readable)</title>
  <style>
    :root { --panel:#0f172a; --text:#e5e7eb; --muted:#94a3b8; --border:#334155; }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      height:100%;
      background:#0a0f0a;
      color:var(--text);
      overflow:hidden;
      font:14px/1.3 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial
    }
    .stage{
      position:relative;
      width:1280px;
      max-width:96vw;
      margin:12px auto;
      border:1px solid var(--border);
      border-radius:14px;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,.4);
      background:#000
    }
    canvas{display:block;width:1280px;max-width:96vw;height:auto;background:#000}
    .overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center}
    .overlay.show{display:flex}
    .glass{background:rgba(0,0,0,.6);backdrop-filter:blur(2px);width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:16px}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:14px;width:min(980px,92vw)}
    .title{font-size:18px;color:#86efac;margin-bottom:8px;text-align:center}
    .levelup{font-size:16px;color:#e2e8f0;margin:-2px 0 8px 0;text-align:center}
    .grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
    .choice{padding:10px;border-radius:12px;background:#111827;border:1px solid var(--border);cursor:pointer;text-align:left}
    .choice:hover{border-color:#22d3ee;background:#0b1220}
    @media(max-width:1200px){.grid3{grid-template-columns:1fr}}
  </style>
</head>

      const m = Math.floor(t / 60);

    glyphAt(i, j) {
      const t = ((i * 73856093) ^ (j * 19349663)) >>> 0;
      const r = t % 100;

      const { W, H } = RS.Config;
      const camX = st.player.x - W / 2;
      const camY = st.player.y - H / 2;
      return (
        x > camX - 20 && x < camX + W + 20 &&
        y > camY - 20 && y < camY + H + 20
      );
    }
  };

  function drawSpriteBat(ctx, x, y, scale) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scale, scale);
    ctx.fillStyle = '#171f3a';
    ctx.beginPath();
    ctx.moveTo(0, -6);
    ctx.quadraticCurveTo(12, -10, 14, -1);
    ctx.quadraticCurveTo(10, 2, 12, 4);
    ctx.quadraticCurveTo(7, 2, 8, 7);
    ctx.quadraticCurveTo(4, 4, 0, 6);
    ctx.quadraticCurveTo(-4, 4, -8, 7);
    ctx.quadraticCurveTo(-7, 2, -12, 4);
    ctx.quadraticCurveTo(-10, 2, -14, -1);
    ctx.quadraticCurveTo(-12, -10, 0, -6);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#252f57';
    ctx.beginPath();
    ctx.moveTo(0, -6);
    ctx.quadraticCurveTo(8, -6, 9, -1);
    ctx.quadraticCurveTo(6, 0, 7, 3);
    ctx.lineTo(0, 1);
    ctx.lineTo(-7, 3);
    ctx.quadraticCurveTo(-6, 0, -9, -1);
    ctx.quadraticCurveTo(-8, -6, 0, -6);
    ctx.fill();
    ctx.fillStyle = '#424b7d';
    ctx.beginPath();
    ctx.moveTo(0, -5);
    ctx.quadraticCurveTo(4, -5, 5, -1);
    ctx.quadraticCurveTo(3, 0, 4, 2);
    ctx.lineTo(0, 0);
    ctx.lineTo(-4, 2);
    ctx.quadraticCurveTo(-3, 0, -5, -1);
    ctx.quadraticCurveTo(-4, -5, 0, -5);
    ctx.fill();
    ctx.fillStyle = '#ffe08a';
    ctx.fillRect(-2.5, -2, 2, 2);
    ctx.fillRect(0.5, -2, 2, 2);
    ctx.fillStyle = '#f87171';
    ctx.fillRect(-1, 1, 2, 1);
    ctx.restore();
  }
  function drawSpriteSlime(ctx, x, y, scale) {

    ctx.ellipse(3.5, -4, 2.2, 1.1, 0.3, 0, Math.PI * 2);

    ctx.fillStyle = '#0f172a';

    ctx.ellipse(3, 1, 1.2, 1.6, 0, 0, Math.PI * 2);

    ctx.fillStyle = '#1e3a8a';
    ctx.beginPath();
    ctx.moveTo(-2, 4);
    ctx.quadraticCurveTo(0, 5, 2, 4);
    ctx.quadraticCurveTo(0, 6, -2, 4);
    ctx.fill();
    ctx.restore();

    ctx.moveTo(0, -8);
    ctx.lineTo(7, 0);
    ctx.lineTo(4, 4);
    ctx.lineTo(4, 10);
    ctx.lineTo(-4, 10);
    ctx.lineTo(-4, 4);
    ctx.lineTo(-7, 0);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#22c55e';
    ctx.beginPath();
    ctx.moveTo(0, -7);
    ctx.quadraticCurveTo(4, -5, 5, -1);
    ctx.lineTo(5, 4);
    ctx.quadraticCurveTo(0, 5, -5, 4);
    ctx.lineTo(-5, -1);
    ctx.quadraticCurveTo(-4, -5, 0, -7);
    ctx.fill();
    ctx.fillStyle = '#0a0f14';
    ctx.beginPath();
    ctx.ellipse(-2, -1, 1.3, 1.6, 0, 0, Math.PI * 2);
    ctx.ellipse(2, -1, 1.3, 1.6, 0, 0, Math.PI * 2);

    ctx.fillRect(3, -2, 2, 4);
    ctx.fillRect(-6, 0, 2, 2);
    ctx.fillRect(4, 0, 2, 2);
    ctx.fillStyle = '#f97316';
    ctx.fillRect(-3, -1, 2, 2);
    ctx.fillRect(1, -1, 2, 2);
    ctx.restore();

      let angle;

      } else {

      }
      const dirX = Math.cos(angle);

      const radius = data.range / 2;
      const centerX = s.player.x + dirX * radius;
      const centerY = s.player.y + dirY * radius;
      const arcDir = Math.random() < 0.5 ? -1 : 1;
      const rightX = -dirY;
      const rightY = dirX;
      const startPhase = -Math.PI / 2;
      s.boomerangs.push({
        x: s.player.x,
        y: s.player.y,
        prevX: s.player.x,
        prevY: s.player.y,
        centerX,
        centerY,
        forwardX: dirX,
        forwardY: dirY,
        rightX,
        rightY,
        radius,
        phase: startPhase,
        endPhase: startPhase + Math.PI * 2,
        angularSpeed: data.speed / Math.max(radius, 1),
        arcDir,
        carryXp: 0,

    },
    boomerang(dt, s) {
      const data = s.boomerang;
      data.timer -= dt * s.atkSpeed;
      if (data.timer <= 0 && s.boomerangs.length < data.count) {
        this.spawnBoomerang(s);
        data.timer = data.cooldown;
      }
      for (let i = s.boomerangs.length - 1; i >= 0; i--) {
        const b = s.boomerangs[i];
        const prevX = b.x;
        const prevY = b.y;
        b.phase += b.angularSpeed * dt;
        if (b.phase > b.endPhase) b.phase = b.endPhase;
        const cos = Math.cos(b.phase) * b.radius * b.arcDir;
        const sin = Math.sin(b.phase) * b.radius;
        b.x = b.centerX + b.rightX * cos + b.forwardX * sin;
        b.y = b.centerY + b.rightY * cos + b.forwardY * sin;
        const dxStep = b.x - prevX;
        const dyStep = b.y - prevY;
        b.heading = Math.atan2(dyStep, dxStep);
        b.spinAngle = (b.spinAngle || 0) + (b.spinSpeed || 0) * dt;
        b.prevX = b.x;
        b.prevY = b.y;

        for (let j = s.enemies.length - 1; j >= 0; j--) {
          const e = s.enemies[j];

        }

        for (let j = s.orbs.length - 1; j >= 0; j--) {

          if (RS.Util.dist2(b.x, b.y, o.x, o.y) < 18 * 18) {

            s.orbs.splice(j, 1);

            b.carryHeals += 1;
            s.heals.splice(j, 1);

        }

        if (RS.Util.dist2(b.x, b.y, s.player.x, s.player.y) < (s.player.r + 10) ** 2 || b.phase >= b.endPhase - 0.01) {

            s.player.xp += b.carryXp * s.player.xpGain;
            while (s.player.xp + RS.Config.BALANCE.XP_EPS >= s.player.xpTo) {
              const from = s.player.level;
              s.player.xp -= s.player.xpTo;
              s.player.level += 1;
              s.player.xpTo = Math.floor(s.player.xpTo * (s.player.level <= 10 ? 1.22 : 1.12) + (s.player.level <= 10 ? 8 : 4));
              RS.State.levelUpFrom = from;
              RS.State.levelUpTo = s.player.level;

          while (b.carryHeals > 0 && s.player.hearts < s.player.maxHearts) {

          while (b.carryHeals > 0) {
            s.heals.push({ x: s.player.x + RS.Util.rnd(-14, 14), y: s.player.y + RS.Util.rnd(-14, 14), phase: 0 });
            b.carryHeals--;

      if (sw.timer <= 0) {
        const target = nearestEnemyTo(s.player.x, s.player.y, s.enemies, sw.reach + 20);
        if (!sw.angleSeed) sw.angleSeed = 0;

          angle = Math.atan2(target.y - s.player.y, target.x - s.player.x);

        sw.lastAngle = angle;
        sw.swings.push({ t: 0, life: sw.duration, angle, reach: sw.reach, hit: new WeakSet() });
        sw.timer = sw.cooldown;
        s.stats.swordSwings += 1;
      }
      for (let i = sw.swings.length - 1; i >= 0; i--) {

        swing.t += dt;
        for (let j = s.enemies.length - 1; j >= 0; j--) {
          const e = s.enemies[j];
          if (swing.hit.has(e)) continue;
          const dx = e.x - s.player.x;
          const dy = e.y - s.player.y;
          const dist = Math.hypot(dx, dy);
          if (dist > swing.reach + e.r) continue;
          const angToEnemy = Math.atan2(dy, dx);
          let diff = angToEnemy - swing.angle;
          diff = Math.atan2(Math.sin(diff), Math.cos(diff));
          if (Math.abs(diff) <= Math.PI / 2) {
            RS.Systems.applyDamage(e, RS.Systems.effDamage(sw.dmg, s), s);
            swing.hit.add(e);
          }
        }
        if (swing.t >= swing.life) sw.swings.splice(i, 1);

    },
    spinner(dt, s) {
      const collided = new Map();
      for (const ring of s.spinner.rings) {
        ring.angle += ring.speed * dt * s.atkSpeed;
        for (let b = 0; b < ring.count; b++) {
          const ang = ring.angle + (Math.PI * 2 * b) / ring.count;
          const bx = s.player.x + Math.cos(ang) * ring.radius;

  function nearestEnemyTo(x, y, list, range) {
    let best = null, bestD2 = range * range;
    for (const e of list) {
      const d2 = RS.Util.dist2(x, y, e.x, e.y);
      if (d2 < bestD2) { bestD2 = d2; best = e; }
    }
    return best;
  }

  RS.UI = {
    uiButtons: [],
    addBtn(x, y, w, h, label, action, opts) {
      const passive = !!(opts && opts.passive);
      RS.Render.drawButton(x, y, w, h, label, passive);
      if (!passive && typeof action === 'function') this.uiButtons.push({ x, y, w, h, label, action });
    },
    click(ev) {
      const r = cvs.getBoundingClientRect();
      const mx = ev.clientX - r.left, my = ev.clientY - r.top;
      for (const b of RS.UI.uiButtons) {
        if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) { b.action(); return; }
      }
    },
    showLevelModal(show) { levelModal.classList.toggle('show', !!show && !RS.State.gameOver); },
    setChoices(items) { RS.State.currentChoices = items; RS.UI.renderChoices(); },
    renderChoices() {
      levelUpLabel.textContent = (RS.State.levelUpFrom != null && RS.State.levelUpTo != null)
        ? `Level ${RS.State.levelUpFrom} → ${RS.State.levelUpTo}`
        : '';
      choicesEl.innerHTML = '';
      (RS.State.currentChoices || []).forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'choice';
        btn.innerHTML = `
          <div style="color:#e2e8f0;font-weight:600">${c.name}</div>
          <div style="color:#94a3b8;font-size:13px">${c.desc}</div>
          <div style="color:#94a3b8;font-size:12px;margin-top:4px">Rank ${(RS.State.levels[c.id] || 0)} / ${c.max}</div>
        `;
        btn.onclick = () => RS.UI.takeUpgrade(c);
        choicesEl.appendChild(btn);
      });
    },
    rollChoices() {
      const pool = Object.values(RS.Registry.Relics)
        .filter(d => (RS.State.levels[d.id] ?? 0) < d.max)
        .filter(d => !d.canOffer || d.canOffer(RS.State));
      const k = Math.min(3, pool.length), picked = [];
      while (picked.length < k && pool.length) {
        const i = (Math.random() * pool.length) | 0;
        picked.push(pool[i]);
        pool.splice(i, 1);
      }
      RS.UI.setChoices(picked);
      RS.State.paused = true;
      RS.UI.showLevelModal(true);
    },
    takeUpgrade(u) {
      RS.State.levels[u.id] = (RS.State.levels[u.id] || 0) + 1;
      u.onPick(RS.State);
      RS.State.currentChoices = null;
      RS.State.paused = false;

    drawHearts(x, y, hearts, maxHearts) {

      const showExtraFull = frac >= 0.75;

      for (let i = 0; i < maxHearts; i++) {
        let state = 0;
        if (i < full) state = 1;
        else if (i === full) {

          else if (showHalf) state = 0.5;

      }

    heart(x, y, state) {

      ctx.moveTo(9, 16);
      ctx.bezierCurveTo(0, 9, 0, 4, 5, 3);
      ctx.bezierCurveTo(8, 2, 9, 4, 9, 6);
      ctx.bezierCurveTo(9, 4, 10, 2, 13, 3);
      ctx.bezierCurveTo(18, 4, 18, 9, 9, 16);
      ctx.closePath();
      ctx.strokeStyle = '#3a0a0a';
      ctx.lineWidth = 2;

        ctx.bezierCurveTo(18, 4, 18, 9, 9, 16);

            ctx.beginPath();

            ctx.moveTo(gx + 2, gy);
            ctx.lineTo(gx + 1, gy - 12);
