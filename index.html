          if (skipSplit) {
            const offset = 10;
            const leftValue = Math.floor(xpValue / 2);
            const rightValue = xpValue - leftValue;
            if (leftValue > 0) s.orbs.push({ x: e.x - offset, y: e.y, v: leftValue });
            if (rightValue > 0) s.orbs.push({ x: e.x + offset, y: e.y, v: rightValue });
          } else if (!isSlime) {
            s.orbs.push({ x: e.x, y: e.y, v: xpValue });
          }
          const maxHeals = RS.Config.BALANCE.MAX_HEALS_ON_FIELD ?? Infinity;
          if (s.heals.length < maxHeals && Math.random() < 0.005) {
            s.heals.push({ x: e.x, y: e.y, phase: 0 });
          }
          const magnetRank = Math.max(0, s.levels.magnet || 0);
          const baseChance = 0.0001;
          const maxChance = 0.0003;
          const step = (maxChance - baseChance) / 5;
          const chance = Math.min(maxChance, baseChance + step * Math.min(5, magnetRank));
          if (Math.random() < chance) s.vacuumDrops.push({ x: e.x, y: e.y, t: 0, life: 12, pulse: 0 });
          removeEnemy();
        }
      }
    },
    updateSwordProfile(s) {
      const arcs = RS.Config.WEAPONS.sword.arcs || [180];
      const rank = Math.max(1, s.levels.sword || 0);
      const idx = Math.min(arcs.length - 1, rank - 1);
      s.sword.arc = (arcs[idx] * Math.PI) / 180;
      s.sword.dmg = RS.Config.WEAPONS.sword.baseDamage;
    },
    updateBombProfile(s) {
      const radii = RS.Config.WEAPONS.bomb.radiusByRank || [70];
      const rank = Math.max(1, s.levels.bomb || 0);
      const idx = Math.min(radii.length - 1, rank - 1);
      s.bomb.explosionRadius = radii[idx] * 1.15;
      const maxTrail = RS.Config.WEAPONS.bomb.maxTrail ?? 5;
      s.bomb.trail = Math.min(rank - 1, maxTrail);
      s.bomb.trailLeft = Math.min(s.bomb.trailLeft, s.bomb.trail);
      s.bomb.maxAmmo = Math.max(1, 1 + s.bomb.trail);
      if (typeof s.bomb.ammo !== 'number') s.bomb.ammo = s.bomb.maxAmmo;
      s.bomb.ammo = Math.min(s.bomb.ammo, s.bomb.maxAmmo);
      s.bomb.rechargeTimer = Math.min(s.bomb.rechargeTimer || 0, s.bomb.cooldown);
      s.bomb.autoCooldownTimer = Math.min(s.bomb.autoCooldownTimer || 0, 0.2);
      s.bomb.dmg = RS.Config.WEAPONS.bomb.baseDamage;
    },
    generateScenery(s) {
      s.scenery.length = 0;
      const spacing = 300;
      const margin = 220;
      for (let x = margin, xi = 0; x < RS.Config.MAP - margin; x += spacing, xi++) {
        for (let y = margin, yi = 0; y < RS.Config.MAP - margin; y += spacing, yi++) {
          const noise = ((xi * 92837111) ^ (yi * 689287499)) >>> 0;
          if ((noise & 31) < 7) {
            const offsetX = (((noise >> 5) & 255) - 128) * 0.6;
            const offsetY = (((noise >> 13) & 255) - 128) * 0.6;
            const variant = (noise >> 21) & 3;
            s.scenery.push({ type: 'tree', x: x + offsetX, y: y + offsetY, variant });
          }
        }
      }
    },
    addXp(amount, s) {
      if (amount <= 0) return;
      s.player.xp += amount * s.player.xpGain;
      while (s.player.xp + RS.Config.BALANCE.XP_EPS >= s.player.xpTo) {
        const from = s.player.level;
        s.player.xp -= s.player.xpTo;
        s.player.level += 1;
        const nextLevel = s.player.level;
        const mult = nextLevel <= 10 ? 1.22 : 1.12;
        const add = nextLevel <= 10 ? 8 : 4;
        s.player.xpTo = Math.floor(s.player.xpTo * mult + add);
        RS.State.levelUpFrom = from;
        RS.State.levelUpTo = s.player.level;
        RS.UI.rollChoices();
      }
    },
    onDeath(s) {
      s.gameOver = true;
      s.paused = false;
      s.currentChoices = null;
      RS.UI.showLevelModal(false);
      RS.UI.uiButtons = [];
      RS.UI.setPauseOverlayDuringChoices(false);
      this.haltBoomerangs(s);
    },
    restart(s) {
      s.devPanelOpen = false;
      s.pauseOptionsOpen = false;
      Object.assign(s.player, {
        x: RS.Config.MAP / 2, y: RS.Config.MAP / 2,
        vx: 0, vy: 0, r: 14,
        baseSpeed: 250,
        hearts: 3, maxHearts: 3, iFrames: 0,
        damageMult: 1,
        pickup: 60,
        level: 1, xp: 0, xpTo: 20, xpGain: 1,
        facing: 0
      });
      s.enemies.length = s.projs.length = s.orbs.length = s.heals.length = s.bombs.length = s.placedBombs.length = s.thrownBombs.length = s.bolts.length = s.trails.length = s.vacuumDrops.length = 0;
      this.haltBoomerangs(s, { clear: true });
      s.spinner.rings.length = 0;
      s.spinner.dmg = RS.Config.WEAPONS.spinner.baseDamage;
      s.sword.swings.length = 0;
      Object.assign(s.sword, { enabled: false, timer: 0, cooldown: RS.Config.WEAPONS.sword.baseCooldown, dmg: RS.Config.WEAPONS.sword.baseDamage, reach: 120, duration: 0.26, angleSeed: 0, lastAngle: 0 });
      Object.assign(s.bow,   { enabled: false, cooldown: RS.Config.WEAPONS.bow.baseCooldown, timer: 0, arrows: 1, dmg: RS.Config.WEAPONS.bow.baseDamage, speed: 560, life: 1.8, pierce: 0 });
      Object.assign(s.bomb,  { enabled: false, cooldown: RS.Config.WEAPONS.bomb.baseCooldown, dmg: RS.Config.WEAPONS.bomb.baseDamage, explosionRadius: RS.Config.WEAPONS.bomb.radiusByRank[0] * 1.15, fuse: 1.0, trail: 0, trailGap: 0.35, trailLeft: 0, trailTimer: 0, ammo: 1, maxAmmo: 1, rechargeTimer: 0, autoCooldownTimer: 0 });
      Object.assign(s.storm, { enabled: false, timer: 0, cooldown: RS.Config.WEAPONS.storm.baseCooldown, dmg: RS.Config.WEAPONS.storm.baseDamage, chains: 2, range: 300 });
      Object.assign(s.boomerang, { count: 1, cooldown: 0.75, speed: RS.Config.WEAPONS.boomerang.baseSpeed, range: 320, damage: RS.Config.WEAPONS.boomerang.baseDamage, ammo: 1, maxAmmo: 1, collectRadius: 18 });
      s.boomerangAngle = 0;
      for (const k in s.levels) s.levels[k] = 0;
      s.levels.boomerang = 1;
      Object.assign(s.stats, { kills: 0, arrowsFired: 0, bombsPlaced: 0, boltsCast: 0, swordSwings: 0, boomerangsThrown: 0, distance: 0, damageDealt: 0 });
      s.atkSpeed = 1.0;
      s.leechRate = 0.0;
      s.leechPool = 0.0;
      s.paused = false;
      s.gameOver = false;
      s.elapsed = 0;
      s.spinnerAcc = new WeakMap();
      s.batTimer = RS.Config.BALANCE.BAT_BASE_PERIOD_S;
      s.goblinTimer = RS.Config.BALANCE.GOBLIN_BASE_PERIOD_S;
      s.goblinAmbushDone = false;
      s.manualWeapon = 'boomerang';
      s.manualAim = null;
      s.weaponSlots = [ 'boomerang', null, null, null, null, null ];
      const controlPrefs = s.settings.controlModes || (s.settings.controlModes = { arcade: 'auto', adventure: 'manual' });
      const defaultMode = controlPrefs[s.gameplayMode] || (s.gameplayMode === 'adventure' ? 'manual' : 'auto');
      this.setControlMode(s, defaultMode, { skipPreference: true });
      RS.State.mode = 'playing';
      RS.UI.setPauseOverlayDuringChoices(false);
      if (s.gameplayMode === 'adventure') {
        s.modeLabel = 'Adventure Mode (WIP)';
        s.adventureStage = 'grasslands-intro';
        s.adventureObjective = 'Explore the clearing and claim the Boomerang.';
      } else {
        s.modeLabel = 'Arcade Mode';
        s.adventureStage = null;
        s.adventureObjective = null;
      }
      s.modeBannerTimer = 3;
      RS.Systems.updateSwordProfile(s);
      RS.Systems.updateBombProfile(s);
      if (!s.sceneryReady) {
        RS.Systems.generateScenery(s);
        s.sceneryReady = true;
      }
      RS.UI.uiButtons = [];
      RS.UI.showLevelModal(false);
      RS.Systems.updateBoomerangProfile(s);
      RS.Systems.updateMagnetProfile(s);
      RS.Systems.updateStormProfile(s);
      RS.Systems.updateSpinnerProfile(s);
      if (s.wake.enabled) RS.Systems.updateWakeProfile(s);
    }
  };

  function nearestEnemyTo(x, y, list, range) {
    let best = null, bestD2 = range * range;
    for (const e of list) {
      if (!RS.Systems.isEnemyTargetable(e)) continue;
      const d2 = RS.Util.dist2(x, y, e.x, e.y);
      if (d2 < bestD2) { bestD2 = d2; best = e; }
    }
    return best;
  }

  // =====================================
  // UI
  // =====================================
  RS.UI = {
    uiButtons: [],
    hotspots: [],
    addBtn(x, y, w, h, label, action, opts) {
      const passive = !!(opts && opts.passive);
      RS.Render.drawButton(x, y, w, h, label, passive);
      if (!passive && typeof action === 'function') this.uiButtons.push({ x, y, w, h, label, action });
    },
    addHotspot(x, y, w, h, action) {
      if (typeof action === 'function') this.hotspots.push({ x, y, w, h, action });
    },
    click(ev) {
      const rect = cvs.getBoundingClientRect();
      const scaleX = rect.width ? cvs.width / rect.width : 1;
      const scaleY = rect.height ? cvs.height / rect.height : 1;
      const mx = (ev.clientX - rect.left) * scaleX;
      const my = (ev.clientY - rect.top) * scaleY;
      for (const b of RS.UI.uiButtons) {
        if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) { b.action(); return true; }
      }
      for (let i = RS.UI.hotspots.length - 1; i >= 0; i--) {
        const h = RS.UI.hotspots[i];
        if (mx >= h.x && mx <= h.x + h.w && my >= h.y && my <= h.y + h.h) { h.action(); return true; }
      }
      return false;
    },
    showLevelModal(show) {
      RS.State.levelModalOpen = !!show && !RS.State.gameOver;
      RS.UI.refreshLevelModal();
    },
    refreshLevelModal() {
      const shouldShow = !!(RS.State.levelModalOpen && RS.State.currentChoices && !RS.State.gameOver && !RS.State.pauseOverlayDuringChoices);
      levelModal.classList.toggle('show', shouldShow);
    },
    setPauseOverlayDuringChoices(flag) {
      RS.State.pauseOverlayDuringChoices = !!flag;
      RS.UI.refreshLevelModal();
    },
    setChoices(items) { RS.State.currentChoices = items; RS.UI.renderChoices(); },
    renderChoices() {
      levelUpLabel.textContent = (RS.State.levelUpFrom != null && RS.State.levelUpTo != null)
        ? `Level ${RS.State.levelUpFrom} → ${RS.State.levelUpTo}`
        : '';
      choicesEl.innerHTML = '';
      (RS.State.currentChoices || []).forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'choice';
        const icon = RS.Registry.ICON[c.id] || '•';
        const currentRank = RS.State.levels[c.id] || 0;
        const descText = currentRank > 0 && c.rankDesc ? c.rankDesc : c.desc;
        btn.innerHTML = `
          <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
            <div style="font-size:32px;line-height:1">${icon}</div>
            <div style="color:#e2e8f0;font-weight:600;text-align:center">${c.name}</div>
            <div style="color:#94a3b8;font-size:13px;text-align:center">${descText}</div>
            <div style="color:#94a3b8;font-size:12px">Rank ${currentRank} / ${c.max}</div>
          </div>
        `;
        btn.onclick = () => RS.UI.takeUpgrade(c);
        choicesEl.appendChild(btn);
      });
    },
    rollChoices() {
      const pool = Object.values(RS.Registry.Relics)
        .filter(d => (RS.State.levels[d.id] ?? 0) < d.max)
        .filter(d => !d.canOffer || d.canOffer(RS.State));
      const k = Math.min(3, pool.length), picked = [];
      while (picked.length < k && pool.length) {
        const i = (Math.random() * pool.length) | 0;
        picked.push(pool[i]);
        pool.splice(i, 1);
      }
      RS.UI.setChoices(picked);
      RS.State.paused = true;
      RS.UI.setPauseOverlayDuringChoices(false);
      RS.UI.showLevelModal(true);
    },
    takeUpgrade(u) {
      RS.State.levels[u.id] = (RS.State.levels[u.id] || 0) + 1;
      u.onPick(RS.State);
      RS.State.currentChoices = null;
      RS.UI.setPauseOverlayDuringChoices(false);
      RS.State.paused = false;
      RS.State.player.iFrames = Math.max(RS.State.player.iFrames, RS.Config.BALANCE.LEVELUP_IFRAMES);
      RS.UI.showLevelModal(false);
    }
  };

  cvs.addEventListener('click', (ev) => {
    RS.Audio.resume();
    const s = RS.State;
    if (s.mode === 'attract') { s.mode = 'menu'; return; }
    if (RS.UI.click(ev)) return;
    if (s.mode !== 'playing' || s.paused || s.gameOver || s.currentChoices) return;
    if (s.controlMode !== 'manual') return;
    const rect = cvs.getBoundingClientRect();
    const scaleX = rect.width ? cvs.width / rect.width : 1;
    const scaleY = rect.height ? cvs.height / rect.height : 1;
    const mx = (ev.clientX - rect.left) * scaleX;
    const my = (ev.clientY - rect.top) * scaleY;
    const weapon = s.manualWeapon;
    if (!weapon) return;
    if (!RS.Systems.manualEligible(weapon)) return;
    if (!RS.Systems.weaponAvailable(s, weapon)) return;
    const target = RS.Util.screenToWorld(mx, my, s);
    RS.Systems.queueManual(s, weapon, target.x, target.y);
    s.player.facing = Math.atan2(target.y - s.player.y, target.x - s.player.x);
  });

  // =====================================
  // Input
  // =====================================
  addEventListener('keydown', (e) => {
    RS.Audio.resume();
    const s = RS.State;
    if (s.paused && !s.gameOver && e.metaKey && e.altKey && (e.code === 'KeyZ' || e.key === 'z' || e.key === 'Z')) {
      s.devPanelOpen = !s.devPanelOpen;
      if (s.devPanelOpen) s.pauseOptionsOpen = false;
      e.preventDefault();
      return;
    }
    RS.State.keys[e.key.toLowerCase()] = true;
    if (e.key === 'Escape') {
      if (s.mode === 'playing' && !s.gameOver) {
        if (s.currentChoices) {
          s.paused = true;
          RS.UI.setPauseOverlayDuringChoices(!s.pauseOverlayDuringChoices);
        } else {
          s.paused = !s.paused;
          if (!s.paused) {
            s.devPanelOpen = false;
            s.pauseOptionsOpen = false;
          }
        }
        RS.UI.uiButtons = [];
      } else if ([ 'how', 'options', 'credits', 'codex', 'playSelect' ].includes(s.mode)) {
        s.mode = 'menu';
        RS.UI.uiButtons = [];
        RS.UI.hotspots = [];
      }
      e.preventDefault();
      return;
    }
    if (!e.metaKey && !e.ctrlKey && !e.altKey) {
      const slot = parseInt(e.key, 10);
      if (!Number.isNaN(slot) && slot >= 1 && slot <= 6) {
        if (s.mode === 'playing' && !s.gameOver && !s.paused && !s.currentChoices) {
          RS.Systems.setManualWeaponBySlot(s, slot - 1);
        }
        e.preventDefault();
        return;
      }
    }
    if (e.key === 'p' || e.key === 'P') {
      if (s.mode === 'playing' && !s.gameOver) {
        if (s.currentChoices) {
          s.paused = true;
          RS.UI.setPauseOverlayDuringChoices(!s.pauseOverlayDuringChoices);
        } else {
          s.paused = !s.paused;
          if (!s.paused) {
            s.devPanelOpen = false;
            s.pauseOptionsOpen = false;
          }
        }
        RS.UI.uiButtons = [];
      }
    }
    if (e.key === 'r' || e.key === 'R') { RS.Systems.restart(RS.State); }
    if (e.key === 'm' || e.key === 'M') {
      if (RS.State.mode === 'playing') {
        RS.Systems.haltBoomerangs(RS.State, { clear: true });
        RS.State.mode = 'menu';
        RS.State.paused = false;
        RS.State.devPanelOpen = false;
        RS.State.pauseOptionsOpen = false;
        RS.State.gameOver = false;
        RS.UI.setPauseOverlayDuringChoices(false);
        RS.UI.uiButtons = [];
      }
    }
    if (RS.State.mode === 'attract') { e.preventDefault(); RS.State.mode = 'menu'; }
  }, { passive: false });

  addEventListener('keyup', (e) => { RS.State.keys[e.key.toLowerCase()] = false; }, { passive: false });
  addEventListener('wheel', (e) => {
    const s = RS.State;
    if (s.mode === 'codex') {
      if (!s.codexScroll) s.codexScroll = { monsters: 0, weapons: 0, relics: 0 };
      let entries = [];
      switch (s.codexFilter) {
        case 'weapons': entries = RS.Registry.Codex.weapons; break;
        case 'relics': entries = RS.Registry.Codex.relics; break;
        default: entries = RS.Registry.Codex.monsters; break;
      }
      const rowH = 44;
      const rowGap = 10;
      const listHeight = CODEX_DIM.height - 128 - 70;
      const maxVisibleRows = Math.max(1, Math.floor((listHeight + rowGap) / (rowH + rowGap)));
      const maxScroll = Math.max(0, entries.length - maxVisibleRows);
      if (maxScroll > 0 && e.deltaY !== 0) {
        const dir = e.deltaY > 0 ? 1 : -1;
        const key = s.codexFilter || 'monsters';
        s.codexScroll[key] = Math.max(0, Math.min(maxScroll, (s.codexScroll[key] || 0) + dir));
        e.preventDefault();
      }
      return;
    }
    if (s.mode !== 'playing' || s.paused || s.gameOver || s.currentChoices) return;
    if (e.deltaY === 0) return;
    const dir = e.deltaY > 0 ? 1 : -1;
    RS.Systems.cycleManualWeapon(s, dir);
    e.preventDefault();
  }, { passive: false });

  // =====================================
  // Renderers
  // =====================================
  RS.Render = {
    drawButton(x, y, w, h, label, inactive = false) {
      const fill = inactive ? '#1f2937' : '#047857';
      const stroke = inactive ? '#111827' : '#046149';
      const text = inactive ? '#9ca3af' : '#ffffff';
      ctx.fillStyle = fill;
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = stroke;
      ctx.strokeRect(x, y, w, h);
      ctx.fillStyle = text;
      ctx.font = '14px ui-sans-serif,system-ui';
      ctx.textAlign = 'center';
      ctx.fillText(label, x + w / 2, y + h / 2 + 4);
      ctx.textAlign = 'start';
    },
    drawCenterText(text, size, y) {
      const { W } = RS.Config;
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(W / 2 - 260, y - size - 6, 520, size + 20);
      ctx.fillStyle = '#f0f0f0';
      ctx.font = `${size}px ui-sans-serif,system-ui`;
      ctx.textAlign = 'center';
      ctx.fillText(text, W / 2, y);
      ctx.textAlign = 'start';
    },
    drawOptionsPanel(x, y, w, h, context = 'menu') {
      const s = RS.State;
      ctx.save();
      ctx.fillStyle = 'rgba(12,17,32,0.92)';
      ctx.fillRect(x, y, w, h);
      ctx.strokeStyle = 'rgba(148,163,184,0.45)';
      ctx.strokeRect(x, y, w, h);
      ctx.fillStyle = '#e2e8f0';
      ctx.font = '18px ui-sans-serif,system-ui';
      ctx.textAlign = 'center';
      ctx.fillText('Options', x + w / 2, y + 34);
      const btnW = Math.min(280, w - 64);
      const btnH = 32;
      const btnX = x + (w - btnW) / 2;
      let cursorY = y + 62;
      const addButton = (label, onClick) => {
        RS.UI.addBtn(btnX, cursorY, btnW, btnH, label, onClick);
        cursorY += btnH + 18;
      };
      const musicLabel = s.settings.musicMuted ? 'Music: Off' : 'Music: On';
      addButton(musicLabel, () => {
        s.settings.musicMuted = !s.settings.musicMuted;
        RS.Audio.refreshVolumes();
      });
      const attackLabel = s.controlMode === 'manual' ? 'Attack Mode: Manual Aim' : 'Attack Mode: Full Auto';
      addButton(attackLabel, () => {
        const next = s.controlMode === 'manual' ? 'auto' : 'manual';
        RS.Systems.setControlMode(RS.State, next);
      });
      const closeLabel = context === 'pause' ? 'Close Options' : 'Back';
      const closeAction = context === 'pause'
        ? () => { RS.State.pauseOptionsOpen = false; RS.UI.uiButtons = []; }
        : () => { RS.State.mode = 'menu'; RS.UI.uiButtons = []; };
      const closeY = y + h - btnH - 24;
      RS.UI.addBtn(btnX, closeY, btnW, btnH, closeLabel, closeAction);
      ctx.restore();
    },
    drawTitleText(text, centerX, topY, scale = 8, fill = '#f8fafc', stroke = '#0a0f0a', strokePad) {
      const upper = text.toUpperCase();
      const glyphs = Array.from(upper).map((ch) => TITLE_FONT[ch] || TITLE_FONT[' ']);
      const totalUnits = glyphs.reduce((sum, glyph) => sum + glyph[0].length + 1, -1);
      const totalWidth = totalUnits * scale;
      const pad = strokePad != null ? strokePad : Math.max(1, Math.round(scale * 0.22));
      let cursor = centerX - totalWidth / 2;
      ctx.save();
      ctx.textAlign = 'start';
      for (const glyph of glyphs) {
        const width = glyph[0].length;
        for (let row = 0; row < glyph.length; row++) {
          for (let col = 0; col < width; col++) {
            if (glyph[row][col] !== '1') continue;
            const pixelX = cursor + col * scale;
            const pixelY = topY + row * scale;
            if (stroke) {
              ctx.fillStyle = stroke;
              ctx.fillRect(pixelX - pad, pixelY - pad, scale + pad * 2, scale + pad * 2);
            }
            ctx.fillStyle = fill;
            ctx.fillRect(pixelX, pixelY, scale, scale);
          }
        }
        cursor += (width + 1) * scale;
      }
      ctx.restore();
    },
    drawHearts(x, y, hearts, maxHearts) {
      const full = Math.floor(hearts);
      const frac = hearts - full;
      const showExtraFull = frac >= 0.75;
      const showHalf = !showExtraFull && frac >= 0.25;
      for (let i = 0; i < maxHearts; i++) {
        let state = 0;
        if (i < full) state = 1;
        else if (i === full) {
          if (showExtraFull) state = 1;
          else if (showHalf) state = 0.5;
        }
        this.heart(x + i * 24, y, state);
      }
    },
    heart(x, y, state) {
      ctx.save();
      ctx.translate(x, y);
      ctx.beginPath();
      ctx.moveTo(9, 16);
      ctx.bezierCurveTo(0, 9, 0, 4, 5, 3);
      ctx.bezierCurveTo(8, 2, 9, 4, 9, 6);
      ctx.bezierCurveTo(9, 4, 10, 2, 13, 3);
      ctx.bezierCurveTo(18, 4, 18, 9, 9, 16);
      ctx.closePath();
      ctx.strokeStyle = '#3a0a0a';
      ctx.lineWidth = 2;
      ctx.stroke();
      if (state === 1) {
        ctx.fillStyle = '#d64040';
        ctx.fill();
      } else if (state === 0.5) {
        ctx.save();
        ctx.translate(4.5, 6);
        ctx.scale(0.65, 0.65);
        ctx.beginPath();
        ctx.moveTo(9, 16);
        ctx.bezierCurveTo(0, 9, 0, 4, 5, 3);
        ctx.bezierCurveTo(8, 2, 9, 4, 9, 6);
        ctx.bezierCurveTo(9, 4, 10, 2, 13, 3);
        ctx.bezierCurveTo(18, 4, 18, 9, 9, 16);
        ctx.closePath();
        ctx.fillStyle = '#d64040';
        ctx.fill();
        ctx.restore();
      }
      ctx.restore();
    },
    world() {
      const { W, H, MAP } = RS.Config, s = RS.State, C = RS.Config.COLORS;
      const camX = s.player.x - W / 2, camY = s.player.y - H / 2;
      ctx.save();
      ctx.translate(-camX, -camY);
      ctx.fillStyle = C.groundBase;
      ctx.fillRect(camX, camY, W, H);
      const step = 64;
      const startX = Math.floor((camX) / step) * step, startY = Math.floor((camY) / step) * step;
      for (let x = startX - step; x < camX + W + step; x += step) {
        for (let y = startY - step; y < camY + H + step; y += step) {
          const i = Math.floor(x / step), j = Math.floor(y / step);
          const noise = ((i * 92837111) ^ (j * 689287499)) >>> 0;
          const baseX = x;
          const baseY = y;
          if ((noise & 3) === 0) {
            ctx.fillStyle = C.groundHighlight;
            ctx.beginPath();
            ctx.ellipse(baseX + step * 0.48, baseY + step * 0.38, step * 0.34, step * 0.14, 0, 0, Math.PI * 2);
            ctx.fill();
          }
          if (((noise >> 1) & 7) === 5) {
            ctx.fillStyle = C.groundShade;
            ctx.beginPath();
            ctx.ellipse(baseX + step * 0.52, baseY + step * 0.68, step * 0.46, step * 0.16, 0, 0, Math.PI * 2);
            ctx.fill();
          }
          if (((noise >> 4) & 15) === 9) {
            ctx.fillStyle = C.groundDirt;
            ctx.beginPath();
            ctx.ellipse(baseX + step * 0.5, baseY + step * 0.55, step * 0.42, step * 0.18, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = C.groundDirtLight;
            ctx.beginPath();
            ctx.ellipse(baseX + step * 0.46, baseY + step * 0.5, step * 0.26, step * 0.1, 0, 0, Math.PI * 2);
            ctx.fill();
          }
          const grassChance = (noise >> 3) & 15;
          if (grassChance <= 3) {
            const gx = baseX + 16 + (noise & 15);
            const gy = baseY + 34 + ((noise >> 4) & 15);
            ctx.strokeStyle = C.grassHighlight;
            ctx.lineWidth = 1.4;
            ctx.beginPath();
            ctx.moveTo(gx, gy);
            ctx.lineTo(gx - 5, gy - 11);
            ctx.moveTo(gx, gy);
            ctx.lineTo(gx + 5, gy - 10);
            ctx.stroke();
            ctx.strokeStyle = C.grassPrimary;
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.moveTo(gx - 2, gy);
            ctx.lineTo(gx - 3, gy - 12);
            ctx.moveTo(gx + 2, gy);
            ctx.lineTo(gx + 1, gy - 12);
            ctx.moveTo(gx, gy);
            ctx.lineTo(gx, gy - 13);
            ctx.stroke();
          }
          if (((noise >> 6) & 31) === 4) {
            ctx.fillStyle = C.pebble;
            ctx.beginPath();
            ctx.ellipse(baseX + 12 + (noise & 7) * 4, baseY + 10 + ((noise >> 6) & 7) * 3, 2.6, 1.4, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'rgba(255,255,255,0.12)';
            ctx.beginPath();
            ctx.ellipse(baseX + 11 + (noise & 7) * 4, baseY + 9 + ((noise >> 6) & 7) * 3, 1.2, 0.6, 0, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }
      ctx.lineWidth = 1;
      const drawTree = (tree) => {
        ctx.save();
        ctx.translate(tree.x, tree.y);
        const scale = 1 + tree.variant * 0.08;
        const size = 32 * scale;
        ctx.fillStyle = 'rgba(0,0,0,0.22)';
        ctx.beginPath();
        ctx.ellipse(0, size * 0.45, size * 0.48, size * 0.2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = C.treeLeafDark;
        ctx.fillRect(-size * 0.55, -size * 0.85, size * 1.1, size * 0.85);
        ctx.fillStyle = C.treeLeaf;
        ctx.fillRect(-size * 0.48, -size * 0.8, size * 0.96, size * 0.74);
        ctx.fillStyle = C.treeHighlight;
        ctx.fillRect(-size * 0.28, -size * 0.8, size * 0.4, size * 0.32);
        ctx.fillStyle = C.treeLeafDark;
        ctx.fillRect(-size * 0.5, -size * 0.35, size * 0.26, size * 0.22);
        ctx.fillRect(size * 0.22, -size * 0.36, size * 0.24, size * 0.2);
        ctx.fillStyle = C.treeTrunkDark;
        ctx.fillRect(-size * 0.16, -size * 0.05, size * 0.32, size * 0.42);
        ctx.fillStyle = C.treeTrunk;
        ctx.fillRect(-size * 0.12, -size * 0.02, size * 0.24, size * 0.38);
        ctx.restore();
      };
      for (const deco of s.scenery) {
        if (deco.type === 'tree' && RS.Util.onScreen(deco.x, deco.y, s)) drawTree(deco);
      }
      ctx.strokeStyle = C.border;
      ctx.lineWidth = 4;
      ctx.strokeRect(0, 0, MAP, MAP);

      const drawBombSprite = (x, y, opts = {}) => {
        const { pulseSeed = 0, sparkSeed = 0, fuseRatio = 0, elevation = 0 } = opts;
        ctx.save();
        ctx.translate(x, y - elevation);
        const pulse = 0.7 + 0.3 * Math.sin(pulseSeed);
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.beginPath();
        ctx.ellipse(0, 9, 12, 4.5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.scale(1 + 0.1 * pulse, 1 + 0.1 * pulse);
        ctx.fillStyle = '#0f172a';
        ctx.beginPath();
        ctx.arc(0, 0, 10, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#1f3a4a';
        ctx.beginPath();
        ctx.arc(-2.2, -2.6, 4.6, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#113027';
        ctx.beginPath();
        ctx.ellipse(0, -6.4, 6.2, 4.0, -0.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#65a30d';
        ctx.beginPath();
        ctx.moveTo(-4.5, -8.8);
        ctx.bezierCurveTo(-2.0, -11.0, 2.0, -11.0, 4.5, -8.8);
        ctx.bezierCurveTo(2.6, -6.4, -2.6, -6.4, -4.5, -8.8);
        ctx.fill();
        ctx.strokeStyle = '#facc15';
        ctx.lineWidth = 2.1;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(0, -10.8);
        ctx.bezierCurveTo(1.2, -13.6, -1.2, -15.2, 0.4, -18);
        ctx.stroke();
        const sparkAlpha = Math.max(0, Math.min(1, 0.55 + 0.35 * Math.sin(sparkSeed)));
        ctx.fillStyle = `rgba(255,196,94,${sparkAlpha})`;
        ctx.beginPath();
        ctx.arc(1.2, -18.4, 2.6 + fuseRatio * 1.8, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.26)';
        ctx.beginPath();
        ctx.arc(-3.2, -3.5, 2.6, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      };

      // Bombs in flight (manual throws)
      for (const tb of RS.State.thrownBombs) {
        const pulseSeed = (tb.t || 0) * 8;
        const sparkSeed = (tb.t || 0) * 12;
        drawBombSprite(tb.x, tb.y, {
          pulseSeed,
          sparkSeed,
          fuseRatio: 0,
          elevation: tb.elevation || 0
        });
      }

      // Bombs (placed indicators)
      for (const b of RS.State.placedBombs) {
        const fuse = Math.max(0.01, b.fuse || RS.State.bomb?.fuse || 1);
        const fuseRatio = Math.max(0, Math.min(1, Math.max(0, b.timer) / fuse));
        let elevation = 0;
        if (b.bounce && b.timer < 0) {
          const phase = Math.max(0, Math.min(1, 1 + b.timer / b.bounce));
          elevation = Math.sin(phase * Math.PI) * 8;
        }
        drawBombSprite(b.x, b.y, {
          pulseSeed: (b.timer || 0) * 8,
          sparkSeed: (b.timer || 0) * 14,
          fuseRatio,
          elevation
        });
      }

      // Bomb shockwaves
      for (const b of RS.State.bombs) {
        const progress = Math.min(1, b.t / Math.max(0.001, b.life));
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255,200,120,${0.55 * (1 - progress)})`;
        ctx.lineWidth = 6;
        ctx.stroke();
        ctx.fillStyle = `rgba(254,240,138,${0.2 * (1 - progress)})`;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r * 0.6, 0, Math.PI * 2);
        ctx.fill();
      }

      // Lightning bolts
      for (const sbolt of RS.State.bolts) {
        const flashDur = sbolt.flash ?? Math.min(0.2, sbolt.life * 0.5);
        const lingerDur = Math.max(0, sbolt.life - flashDur);
        const { x1, y1, x2, y2 } = sbolt;
        ctx.save();
        ctx.lineCap = 'round';

        if (flashDur > 0) {
          const flashProgress = Math.min(1, sbolt.t / flashDur);
          const flashAlpha = Math.max(0, 1 - flashProgress);
          if (flashAlpha > 0.001) {
            const alphaValue = (0.85 * flashAlpha).toFixed(3);
            ctx.strokeStyle = RS.Config.COLORS.bolt.replace('VAR', alphaValue);
            ctx.lineWidth = 4.5 + 4 * flashAlpha;
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
          }
        }

        if (lingerDur > 0) {
          const lingerElapsed = Math.max(0, sbolt.t - flashDur);
          const lingerProgress = Math.min(1, lingerElapsed / lingerDur);
          const lingerAlpha = Math.max(0, 1 - lingerProgress);
          if (lingerAlpha > 0.001) {
            const alphaValue = (0.45 * lingerAlpha).toFixed(3);
            ctx.strokeStyle = RS.Config.COLORS.boltLinger.replace('VAR', alphaValue);
            ctx.lineWidth = 2.2 + 1.8 * lingerAlpha;
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
          }
        }

        ctx.restore();
      }

      // XP orbs
      for (const o of RS.State.orbs) {
        ctx.fillStyle = RS.Config.COLORS.xpBar;
        ctx.beginPath();
        ctx.arc(o.x, o.y, 5, 0, Math.PI * 2);
        ctx.fill();
      }

      // Heals
      for (const h of RS.State.heals) {
        const bob = Math.sin(h.phase * 4) * 3;
        const pulse = 0.55 + 0.08 * Math.sin(h.phase * 6);
        const scale = pulse * 1.4;
        ctx.save();
        ctx.translate(h.x, h.y - bob);
        ctx.scale(scale, scale);
        ctx.beginPath();
        ctx.moveTo(0, 6);
        ctx.bezierCurveTo(-6, 0, -6, -5, -2, -6);
        ctx.bezierCurveTo(0, -6.5, 0, -4, 0, -3);
        ctx.bezierCurveTo(0, -4, 0, -6.5, 2, -6);
        ctx.bezierCurveTo(6, -5, 6, 0, 0, 6);
        ctx.closePath();
        ctx.fillStyle = '#ef4444';
        ctx.fill();
        ctx.lineWidth = 1.5;
        ctx.strokeStyle = 'rgba(190,42,42,0.8)';
        ctx.stroke();
        ctx.restore();
        ctx.save();
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.beginPath();
      ctx.ellipse(h.x, h.y + 8, 6 * scale, 2.6 * scale, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // Vacuum drops
    for (const v of RS.State.vacuumDrops) {
      const pulse = 0.6 + 0.4 * Math.sin((v.pulse || 0) * 3.2);
      const radius = 16 + pulse * 6;
      ctx.save();
      ctx.translate(v.x, v.y);
      ctx.beginPath();
      ctx.arc(0, 0, radius, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(96,165,250,${0.18 + 0.14 * pulse})`;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(0, 0, Math.max(6, radius * 0.45), 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(191,219,254,${0.4 + 0.3 * pulse})`;
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.restore();
    }

      // Enemies + health bars
      for (const e of RS.State.enemies) RS.Registry.Enemies[e.type].draw(e, ctx, RS.State);

      // Projectiles
      for (const pr of RS.State.projs) {
        if (pr.shape === 'arrow') {
          const length = pr.length ?? 12;
          const width = pr.width ?? 4;
          ctx.save();
          ctx.translate(pr.x, pr.y);
          ctx.rotate(pr.heading || Math.atan2(pr.vy || 0, pr.vx || 1));
          ctx.fillStyle = '#fcd34d';
          ctx.beginPath();
          ctx.moveTo(-length * 0.4, -width * 0.5);
          ctx.lineTo(length * 0.5, 0);
          ctx.lineTo(-length * 0.4, width * 0.5);
          ctx.closePath();
          ctx.fill();
          ctx.strokeStyle = '#f59e0b';
          ctx.lineWidth = 1;
          ctx.stroke();
          ctx.restore();
        } else {
          ctx.fillStyle = '#d9e26f';
          ctx.beginPath();
          ctx.arc(pr.x, pr.y, pr.r || 4, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // Sword swings
      for (const swing of s.sword.swings) {
        const arc = swing.arc || Math.PI;
        const span = swing.span ?? arc;
        const start = swing.start ?? (swing.angle - span / 2);
        const progress = Math.min(1, swing.t / swing.life);
        const ease = 1 - Math.pow(1 - progress, 2);
        const fade = 1 - progress;
        const currentAngle = start + span * ease;
        const px = s.player.x;
        const py = s.player.y;
        const reach = swing.reach;

        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.arc(px, py, reach, start, currentAngle);
        ctx.closePath();
        ctx.fillStyle = `rgba(128,102,232,${0.12 + 0.22 * fade})`;
        ctx.fill();

        ctx.strokeStyle = `rgba(236,228,255,${0.38 + 0.32 * fade})`;
        ctx.lineWidth = 2.4;
        ctx.beginPath();
        ctx.arc(px, py, reach, start, currentAngle);
        ctx.stroke();

        const tipX = px + Math.cos(currentAngle) * reach;
        const tipY = py + Math.sin(currentAngle) * reach;
        ctx.beginPath();
        ctx.arc(tipX, tipY, 5 + 3 * fade, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(254,250,255,${0.45 + 0.4 * fade})`;
        ctx.fill();

        ctx.save();
        ctx.translate(px, py);
        ctx.rotate(currentAngle);

        const gripLength = 18;
        const gripOffset = Math.max(8, reach * 0.12);
        const gripStart = gripOffset - gripLength * 0.25;
        const guardThickness = 5;
        const guardHalf = 11;
        const bladeStart = gripStart + gripLength + guardThickness * 0.6;
        const bladeEnd = reach;
        const bladeWidth = 10;

        ctx.fillStyle = '#3f2b1d';
        ctx.fillRect(gripStart, -3.5, gripLength, 7);

        ctx.fillStyle = '#d2b067';
        ctx.fillRect(gripStart + gripLength, -guardHalf, guardThickness, guardHalf * 2);

        ctx.beginPath();
        ctx.moveTo(bladeStart, -bladeWidth / 2);
        ctx.lineTo(bladeEnd - 8, -bladeWidth * 0.35);
        ctx.lineTo(bladeEnd, 0);
        ctx.lineTo(bladeEnd - 8, bladeWidth * 0.35);
        ctx.lineTo(bladeStart, bladeWidth / 2);
        ctx.closePath();
        ctx.fillStyle = '#f4f6ff';
        ctx.fill();
        ctx.strokeStyle = 'rgba(206,196,255,0.9)';
        ctx.lineWidth = 1.6;
        ctx.stroke();

        ctx.restore();
      }

      // Spinner blades
      for (const ring of RS.State.spinner.rings) {
        for (let b = 0; b < ring.count; b++) {
          const ang = ring.angle + (Math.PI * 2 * b) / ring.count;
          const bx = RS.State.player.x + Math.cos(ang) * ring.radius;
          const by = RS.State.player.y + Math.sin(ang) * ring.radius;
          ctx.fillStyle = RS.Config.COLORS.spinner;
          ctx.beginPath();
          ctx.arc(bx, by, 10, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      if (Array.isArray(RS.State.spinner.shots)) {
        for (const shot of RS.State.spinner.shots) {
          ctx.fillStyle = RS.Config.COLORS.spinner;
          ctx.beginPath();
          ctx.arc(shot.x, shot.y, shot.radius || 10, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = 'rgba(255,255,255,0.4)';
          ctx.lineWidth = 2;
          ctx.stroke();
        }
      }

      // Wake trails
      for (const t of RS.State.trails) {
        const a = 1 - t.t / t.life;
        ctx.fillStyle = RS.Config.COLORS.spinnerTrail.replace('VAR', (0.35 * a).toString());
        ctx.beginPath();
        ctx.arc(t.x, t.y, t.r * (0.9 + 0.3 * a), 0, Math.PI * 2);
        ctx.fill();
      }

      for (const b of RS.State.boomerangs) {
        ctx.save();
        ctx.translate(b.x, b.y);
        ctx.rotate((b.heading || 0) + (b.spinAngle || 0));
        const outerR = 18;
        const innerR = 10;
        const start = -Math.PI * 0.55;
        const end = Math.PI * 0.25;
        const grad = ctx.createLinearGradient(
          Math.cos(start) * outerR,
          Math.sin(start) * outerR,
          Math.cos(end) * outerR,
          Math.sin(end) * outerR
        );
        grad.addColorStop(0, '#fed7aa');
        grad.addColorStop(0.4, '#fdba74');
        grad.addColorStop(1, '#fb923c');
        ctx.beginPath();
        ctx.moveTo(Math.cos(start) * innerR, Math.sin(start) * innerR);
        ctx.lineTo(Math.cos(start) * outerR, Math.sin(start) * outerR);
        ctx.arc(0, 0, outerR, start, end);
        ctx.lineTo(Math.cos(end) * innerR, Math.sin(end) * innerR);
        ctx.arc(0, 0, innerR, end, start, true);
        ctx.closePath();
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.strokeStyle = '#9a3412';
        ctx.lineWidth = 1.4;
        ctx.stroke();
        ctx.strokeStyle = 'rgba(255,255,255,0.7)';
        ctx.lineWidth = 1.1;
        ctx.beginPath();
        const mid = (start + end) / 2;
        ctx.moveTo(Math.cos(start) * (innerR + 1), Math.sin(start) * (innerR + 1));
        ctx.quadraticCurveTo(
          Math.cos(mid) * (outerR + 1.5),
          Math.sin(mid) * (outerR + 1.5),
          Math.cos(end) * (innerR + 1),
          Math.sin(end) * (innerR + 1)
        );
        ctx.stroke();
        ctx.restore();
      }

      // Player
      if (!RS.State.hidePlayerSprite) {
        const sps = 16;
        ctx.fillStyle = '#e2d9b0';
        ctx.fillRect(RS.State.player.x - sps / 2, RS.State.player.y - sps / 2, sps, sps);
        ctx.fillStyle = '#5b8c5a';
        ctx.fillRect(RS.State.player.x - sps / 2, RS.State.player.y - sps / 2 - 6, sps, 8);
        ctx.fillStyle = '#3b5d3a';
        ctx.fillRect(RS.State.player.x - sps / 2, RS.State.player.y - sps / 2 + 6, sps, 10);
        if (RS.State.player.iFrames > 0) {
          ctx.strokeStyle = 'rgba(255,255,255,0.7)';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(RS.State.player.x, RS.State.player.y, RS.State.player.r + 6, 0, Math.PI * 2);
          ctx.stroke();
        }
      }
      ctx.restore();
    },
    hud() {
      const { W, H } = RS.Config, s = RS.State, C = RS.Config.COLORS;
      ctx.fillStyle = 'rgba(15,15,15,0.8)';
      ctx.fillRect(0, 0, W, 44);
      RS.Render.drawHearts(16, 10, s.player.hearts, s.player.maxHearts);
      ctx.fillStyle = C.hudText;
      ctx.font = '14px ui-sans-serif,system-ui';
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'center';
      ctx.fillText(`Time ${RS.Util.fmtTime(s.elapsed)}`, W / 2, 21);
      ctx.fillStyle = '#94a3b8';
      ctx.font = '11px ui-sans-serif,system-ui';
      ctx.fillText(`LV ${s.player.level}`, W / 2, 34);
      const pauseBtn = { x: W - 62, y: 8, w: 48, h: 28 };
      ctx.save();
      ctx.fillStyle = '#0d2535';
      ctx.strokeStyle = '#3a6b82';
      ctx.lineWidth = 2;
      const radius = 6;
      ctx.beginPath();
      ctx.moveTo(pauseBtn.x + radius, pauseBtn.y);
      ctx.lineTo(pauseBtn.x + pauseBtn.w - radius, pauseBtn.y);
      ctx.quadraticCurveTo(pauseBtn.x + pauseBtn.w, pauseBtn.y, pauseBtn.x + pauseBtn.w, pauseBtn.y + radius);
      ctx.lineTo(pauseBtn.x + pauseBtn.w, pauseBtn.y + pauseBtn.h - radius);
      ctx.quadraticCurveTo(pauseBtn.x + pauseBtn.w, pauseBtn.y + pauseBtn.h, pauseBtn.x + pauseBtn.w - radius, pauseBtn.y + pauseBtn.h);
      ctx.lineTo(pauseBtn.x + radius, pauseBtn.y + pauseBtn.h);
      ctx.quadraticCurveTo(pauseBtn.x, pauseBtn.y + pauseBtn.h, pauseBtn.x, pauseBtn.y + pauseBtn.h - radius);
      ctx.lineTo(pauseBtn.x, pauseBtn.y + radius);
      ctx.quadraticCurveTo(pauseBtn.x, pauseBtn.y, pauseBtn.x + radius, pauseBtn.y);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = '#f5f5f5';
      const barWidth = 8;
      const barHeight = pauseBtn.h - 10;
      const barY = pauseBtn.y + (pauseBtn.h - barHeight) / 2;
      ctx.fillRect(pauseBtn.x + 12, barY, barWidth, barHeight);
      ctx.fillRect(pauseBtn.x + pauseBtn.w - 12 - barWidth, barY, barWidth, barHeight);
      ctx.restore();
      RS.UI.addHotspot(pauseBtn.x, pauseBtn.y, pauseBtn.w, pauseBtn.h, () => {
        if (RS.State.mode === 'playing' && !RS.State.gameOver) {
          RS.State.paused = !RS.State.paused;
          if (!RS.State.paused) {
            RS.State.devPanelOpen = false;
            RS.State.pauseOptionsOpen = false;
          }
          RS.UI.uiButtons = [];
        }
      });
      RS.Render.weaponBar();
      const xpPct = s.player.xpTo > 0 ? Math.min(s.player.xp / s.player.xpTo, 0.999) : 0;
      const xpHeight = 16;
      const xpWidth = Math.min(520, W * 0.6);
      const xpX = (W - xpWidth) / 2;

    },
    weaponBar() {
      const s = RS.State;
      RS.Systems.ensureWeaponSlots(s);
      const slots = s.weaponSlots || [];
      const { W, H } = RS.Config;
      const radius = 30;
      const spacing = 78;
      const startX = W / 2 - ((slots.length - 1) * spacing) / 2;
      const cy = H - 84;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const getCooldown = (id) => {
        switch (id) {
          case 'boomerang': {
            const data = s.boomerang;
            const maxAmmo = Math.max(1, data.maxAmmo || 1);
            const ammo = Math.max(0, Math.min(maxAmmo, data.ammo || 0));
            const ready = ammo > 0;
            const spent = maxAmmo - ammo;
            const fraction = Math.min(1, spent / maxAmmo);
            const blocked = !ready;
            return { fraction, blocked, ready, remain: spent, cooldown: maxAmmo };
          }
          case 'sword':
            return (() => {
              const remain = Math.max(0, s.sword.timer || 0);
              const cooldown = Math.max(0.001, s.sword.cooldown || 0.001);
              return { fraction: Math.min(1, remain / cooldown), blocked: false, ready: remain <= 0.001, remain, cooldown };
            })();
          case 'bow':
            return (() => {
              const remain = Math.max(0, s.bow.timer || 0);
              const cooldown = Math.max(0.001, s.bow.cooldown || 0.001);
              return { fraction: Math.min(1, remain / cooldown), blocked: false, ready: remain <= 0.001, remain, cooldown };
            })();
          case 'storm':
            return (() => {
              const remain = Math.max(0, s.storm.timer || 0);
              const cooldown = Math.max(0.001, s.storm.cooldown || 0.001);
              return { fraction: Math.min(1, remain / cooldown), blocked: false, ready: remain <= 0.001, remain, cooldown };
            })();
          case 'bomb':
            return (() => {
              const data = s.bomb;
              const cooldown = Math.max(0.001, data.cooldown || 0.001);
              const ready = (data.ammo || 0) > 0;
              const remain = ready || data.maxAmmo <= 0 ? 0 : Math.max(0, cooldown - (data.rechargeTimer || 0));
              return { fraction: Math.min(1, remain / cooldown), blocked: false, ready, remain, cooldown };
            })();
          case 'spinner':
            return (() => {
              const max = Math.max(1, s.spinner.maxBlades || 1);
              const current = RS.Systems.spinnerBladeCount(s);
              const spent = Math.max(0, max - current);
              const fraction = Math.min(1, spent / max);
              const ready = current > 0;
              return { fraction, blocked: !ready, ready, remain: spent, cooldown: max };
            })();
          default:
            return { fraction: 0, blocked: false, ready: true, remain: 0, cooldown: 1 };
        }
      };
      for (let i = 0; i < slots.length; i++) {
        const weaponId = slots[i];
        const cx = startX + i * spacing;
        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        if (!weaponId) {
          ctx.lineWidth = 1.4;
          ctx.strokeStyle = 'rgba(255,255,255,0.4)';
          ctx.stroke();
          ctx.restore();
          continue;
        }
        ctx.fillStyle = 'rgba(12,25,18,0.85)';
        ctx.fill();
        const manualHighlight = s.controlMode === 'manual' && s.manualWeapon === weaponId && RS.Systems.manualEligible(weaponId);
        const autoHighlight = s.controlMode === 'auto' && !!weaponId;
        const highlight = manualHighlight || autoHighlight;
        ctx.lineWidth = highlight ? 4 : 1.6;
        ctx.strokeStyle = highlight ? '#fbbf24' : 'rgba(255,255,255,0.25)';
        ctx.stroke();
        const icon = RS.Registry.ICON[weaponId] || '•';
        ctx.font = '28px ui-sans-serif,system-ui';
        ctx.fillStyle = '#f8fafc';
        ctx.fillText(icon, cx, cy + 1);
        const info = getCooldown(weaponId);
        const fraction = info.fraction ?? 0;
        const blocked = !!info.blocked;
        if (fraction > 0.001) {
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.arc(cx, cy, radius + 0.6, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * fraction, false);
          ctx.closePath();
          ctx.fillStyle = blocked ? 'rgba(12,12,24,0.6)' : 'rgba(0,0,0,0.38)';
          ctx.fill();
        }
        const ammoInfo = (() => {
          if (weaponId === 'boomerang') return { current: s.boomerang.ammo || 0, max: s.boomerang.maxAmmo || 0 };
          if (weaponId === 'bomb') return { current: s.bomb.ammo || 0, max: s.bomb.maxAmmo || 0 };
          return null;
        })();
        if (ammoInfo && ammoInfo.max > 0) {
          const dotSpacing = 8;
          const dotRadius = 2.5;
          const totalWidth = dotSpacing * Math.max(0, ammoInfo.max - 1);
          const dotBaseX = cx - totalWidth / 2;
          const dotY = cy + radius + 8;
          for (let d = 0; d < ammoInfo.max; d++) {
            ctx.beginPath();
            ctx.arc(dotBaseX + d * dotSpacing, dotY, dotRadius, 0, Math.PI * 2);
            ctx.fillStyle = d < ammoInfo.current ? '#f8fafc' : 'rgba(248,250,252,0.25)';
            ctx.fill();
          }
        }
        ctx.restore();
      }
      ctx.textAlign = 'start';
      ctx.textBaseline = 'alphabetic';
    },

    },

      const columns = columnData.length;
      const colWidth = (pw - 40) / columns;
      const drawRow = (entry, rowX, rowY, sectionW) => {
        const relic = RS.Registry.Relics[entry.id];
        const max = relic?.max ?? entry.max ?? 10;
        const min = entry.min ?? (entry.id === 'boomerang' ? 1 : 0);
        const currentRaw = RS.State.levels[entry.id] || 0;
        const current = entry.id === 'boomerang' ? Math.max(min, currentRaw) : currentRaw;
        ctx.fillStyle = '#1f2937';
        ctx.fillRect(rowX, rowY - 3, sectionW, 20);
        ctx.strokeStyle = 'rgba(148,163,184,0.25)';
        ctx.strokeRect(rowX, rowY - 3, sectionW, 20);
        ctx.fillStyle = '#e2e8f0';
        ctx.font = '12px ui-sans-serif,system-ui';
        ctx.textAlign = 'left';
        ctx.fillText(entry.label, rowX + 6, rowY + 10);
        const minusX = rowX + sectionW - 58;
        const plusX = rowX + sectionW - 22;
        const buttonY = rowY - 1;
        ctx.fillStyle = current > min ? 'rgba(59,130,246,0.35)' : 'rgba(55,65,81,0.35)';
        ctx.fillRect(minusX, buttonY, 20, 18);
        ctx.fillStyle = current < max ? 'rgba(59,130,246,0.55)' : 'rgba(55,65,81,0.35)';
        ctx.fillRect(plusX, buttonY, 20, 18);
        ctx.fillStyle = '#f8fafc';
        ctx.font = '13px ui-sans-serif,system-ui';
        ctx.textAlign = 'center';
        ctx.fillText('-', minusX + 10, rowY + 9);
        ctx.fillText('+', plusX + 10, rowY + 9);
        ctx.font = '12px ui-sans-serif,system-ui';
        ctx.fillText(String(current), minusX + 30, rowY + 10);
        ctx.textAlign = 'left';
        RS.UI.addHotspot(minusX, buttonY, 20, 18, () => { RS.Systems.devAdjustLevel(entry.id, -1); });
        RS.UI.addHotspot(plusX, buttonY, 20, 18, () => { RS.Systems.devAdjustLevel(entry.id, 1); });
      };
      columnData.forEach((column, colIdx) => {
        if (colIdx >= columns) return;
        const colX = px + 12 + colIdx * colWidth;
        const headingY = baseY - 8;
        ctx.textAlign = 'left';
        ctx.font = '13px ui-sans-serif,system-ui';
        ctx.fillStyle = '#cbd5f5';
        ctx.fillText(column.heading, colX, headingY);
        column.entries.forEach((entry, idx) => {
          const rowY = baseY + idx * rowSpacing;
          drawRow(entry, colX, rowY, colWidth - 12);
        });
      });
      ctx.restore();
    },
    death() {
      const { W, H } = RS.Config, s = RS.State;
      const totalRelicLevels = Object.values(s.levels).reduce((a, b) => a + (b || 0), 0);
      const lines = [
        `Mode: ${s.modeLabel}`,

        `Total Relic Levels: ${totalRelicLevels}`,
        ...(s.stats.arrowsFired > 0 ? [`Arrows Fired: ${s.stats.arrowsFired}`] : []),
        ...(s.stats.bombsPlaced > 0 ? [`Bombs Placed: ${s.stats.bombsPlaced}`] : []),
        ...(s.stats.boltsCast > 0 ? [`Bolts Cast: ${s.stats.boltsCast}`] : []),
        ...(s.stats.swordSwings > 0 ? [`Sword Swings: ${s.stats.swordSwings}`] : []),
        ...(s.stats.boomerangsThrown > 0 ? [`Boomerangs Thrown: ${s.stats.boomerangsThrown}`] : []),

        `Distance Traveled: ${(s.stats.distance / 64).toFixed(1)} tiles`
      ];
      const chips = Object.values(RS.Registry.Relics).filter(u => (s.levels[u.id] || 0) > 0);
      const chipCols = 4, chipW = 180, chipH = 36, chipGap = 10;
      const statsH = 24 * lines.length + 24;
      const chipRows = Math.max(1, Math.ceil(chips.length / chipCols));
      const chipsH = chipRows * (chipH + chipGap) + 10;
      const boxW = chipCols * (chipW + chipGap) - chipGap + 40;
      const boxH = statsH + 20 + chipsH;
      const buttonOffset = 92;
      const boxOffset = 60;
      const layoutHeight = buttonOffset + boxOffset + boxH;
      const layoutTop = Math.max(16, (H - layoutHeight) / 2);
      const y = layoutTop + buttonOffset;
      const boxTop = y + boxOffset;
      RS.Render.drawCenterText('You Fell', 36, y);
      RS.Render.drawCenterText(`Survived ${RS.Util.fmtTime(s.elapsed)}`, 20, y + 40);
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      ctx.fillRect(W / 2 - boxW / 2, boxTop, boxW, boxH);
      ctx.fillStyle = '#ddd';
      ctx.font = '16px ui-sans-serif,system-ui';
      ctx.textAlign = 'center';
      lines.forEach((line, i) => ctx.fillText(line, W / 2, boxTop + 26 + i * 24));

      for (let i = 0; i < chips.length; i++) {

        ctx.strokeStyle = '#334155'; ctx.lineWidth = 1; ctx.strokeRect(cx, cy, chipW, chipH);
        ctx.fillStyle = '#e2e8f0'; ctx.font = '14px ui-sans-serif,system-ui'; ctx.textAlign = 'left';
        ctx.fillText((RS.Registry.ICON[c.id] || '•') + '  ' + c.name, cx + 8, cy + 14);
        ctx.fillStyle = '#94a3b8';
        ctx.fillText(`Lv ${RS.State.levels[c.id]}`, cx + 8, cy + 28);
      }
      ctx.textAlign = 'start';
      RS.UI.addBtn(W / 2 - 130, layoutTop, 120, 36, 'Restart', () => { RS.Systems.restart(RS.State); });
      RS.UI.addBtn(W / 2 + 10, layoutTop, 120, 36, 'Main Menu', () => {
        RS.Systems.haltBoomerangs(RS.State, { clear: true });
        RS.State.mode = 'menu';
        RS.State.gameOver = false;
        RS.State.paused = false;
        RS.State.devPanelOpen = false;
        RS.State.pauseOptionsOpen = false;
        RS.State.currentChoices = null;
        RS.UI.setPauseOverlayDuringChoices(false);
        RS.UI.showLevelModal(false);
        RS.UI.uiButtons = [];
      });
    },

            statKeys.forEach((key) => {
              const bottom = drawWrappedText(ctx, `${key}: ${statsObj[key]}`, detailX + 200, statLineY, detailW - 220, 18);
              statLineY = bottom + 18;
            });
          }
        }
        if (!isOptions) {
          RS.UI.addBtn(W / 2 - 60, y + boxH - 50, 120, 36, 'Back', () => { RS.State.mode = 'menu'; });
        }
      }
      ctx.textAlign = 'start';
    }
  };

  // =====================================
  // Game Loop
  // =====================================
  let last = 0;
  function loop() {
    requestAnimationFrame(loop);
    const now = performance.now();
    let dt = last ? (now - last) / 1000 : 0;
    last = now;
    if (dt > 0.05) dt = 0.05;
    const s = RS.State;
    RS.Systems.syncBoomerangAudio(s);
    if (s.mode === 'playing' && !s.paused && !s.gameOver) {
      s.player.iFrames = Math.max(0, s.player.iFrames - dt);
      RS.Systems.input(dt, s);
      RS.Systems.spawner(dt, s);
      RS.Systems.enemies(dt, s);
      RS.Systems.boomerang(dt, s);
      RS.Systems.sword(dt, s);
      RS.Systems.spinner(dt, s);
      RS.Systems.bow(dt, s);
      RS.Systems.storm(dt, s);
      RS.Systems.bomb(dt, s);
      RS.Systems.cleanupDeaths(s);
      RS.Systems.pickups(dt, s);
      RS.Systems.updateLeech(dt, s);
      s.elapsed += dt;
      s.modeBannerTimer = Math.max(0, s.modeBannerTimer - dt);
    }
    RS.Audio.update(RS.State, dt);
    draw();
  }

  function draw() {
    const s = RS.State;
    RS.UI.uiButtons = [];
    RS.UI.hotspots = [];
    if ([ 'attract', 'menu', 'how', 'options', 'credits', 'codex', 'playSelect' ].includes(s.mode)) { RS.Render.attract(); return; }
    RS.Render.world();
    RS.Render.hud();
    RS.Render.modeBanner();
    if (s.paused && !s.gameOver && (!s.currentChoices || s.pauseOverlayDuringChoices)) RS.Render.pause();
    if (s.gameOver) RS.Render.death();
  }

  loop();

  // Dev helpers to control choices overlay externally
  function showChoices() { RS.UI.showLevelModal(true); }
  function hideChoices() { RS.UI.showLevelModal(false); }
  function toggleChoices() { levelModal.classList.toggle('show'); }
  function setChoices(items) { RS.UI.setChoices(items); }

  // =====================================
  // Self Tests (light assertions)
  // =====================================
  RS.Tests.run = function () {
    const U = RS.Util, S = RS.State;
    console.assert(U.clamp(5, 0, 3) === 3, 'clamp');
    console.assert(Math.round(Math.sqrt(U.dist2(0, 0, 3, 4))) === 5, 'dist2');
    const ids = new Set(Object.keys(RS.Registry.Relics));
    console.assert(ids.size === Object.keys(RS.Registry.Relics).length, 'relic ids unique');
    const capsOk = ['spinner', 'sword', 'bow', 'pierce', 'boomerang', 'storm', 'bomb', 'wake'].every(id => (RS.Registry.Relics[id]?.max === 5));
    console.assert(capsOk, 'caps=5 core');
    console.assert(!(RS.Registry.Relics.wake.canOffer && RS.Registry.Relics.wake.canOffer(S)), 'wake requires spinner (initially false)');
    console.assert(!(RS.Registry.Relics.leech.canOffer && RS.Registry.Relics.leech.canOffer(S)), 'leech requires sword rank 5 (initially false)');
    {
      const mockState = { stats: { damageDealt: 0 }, leechRate: 0, player: { hearts: 0, maxHearts: 0 } };
      const slime = RS.Registry.Enemies.slime.make(S, { x: 0, y: 0 });
      RS.Systems.applyDamage(slime, 23, mockState, 'test');
      console.assert(!slime.suppressSplit, 'slime overkill requires ≥24 damage');
      const slime2 = RS.Registry.Enemies.slime.make(S, { x: 0, y: 0 });
      RS.Systems.applyDamage(slime2, 24, mockState, 'test');
      console.assert(slime2.suppressSplit, 'slime overkill activates at ≥24 damage');
    }
    {
      const mockBombState = {
        bomb: { enabled: true, cooldown: 6, ammo: 0, maxAmmo: 3, rechargeTimer: 0, fuse: 1, trail: 0, trailLeft: 0, trailGap: 0.35, autoCooldownTimer: 0 },
        atkSpeed: 1,
        manualWeapon: null,
        placedBombs: [],
        thrownBombs: [],
        bombs: [],
        stats: { bombsPlaced: 0 },
        player: { x: 0, y: 0 },
        elapsed: 0,
        enemies: [],
        orbs: [],
        heals: []
      };
      RS.Systems.bomb(6.1, mockBombState);
      console.assert(mockBombState.bomb.ammo === mockBombState.bomb.maxAmmo, 'Bombbloom refills full stock after cooldown');
    }
    {
      const testSlime = RS.Registry.Enemies.slime.make(S, { x: 0, y: 0 });
      const bombTestState = {
        bomb: { enabled: true, cooldown: 6, ammo: 0, maxAmmo: 1, rechargeTimer: 0, fuse: 1, trail: 0, trailLeft: 0, trailGap: 0.35 },
        atkSpeed: 1,
        manualWeapon: null,
        placedBombs: [],
        thrownBombs: [],
        bombs: [{ t: 0, x: testSlime.x, y: testSlime.y, r: 0, target: RS.Config.WEAPONS.bomb.radiusByRank[0], life: 0.32, dmg: RS.Config.WEAPONS.bomb.baseDamage, hit: new WeakSet() }],
        stats: { bombsPlaced: 0 },
        player: { x: 0, y: 0 },
        enemies: [testSlime],
        orbs: [],
        heals: [],
        elapsed: 0
      };
      RS.Systems.bomb(0.05, bombTestState);
      console.assert(testSlime.hp <= 0, 'Bombbloom explosion deals full damage on hit');
    }
    {
      const throwState = {
        bomb: { enabled: true, cooldown: 6, ammo: 0, maxAmmo: 1, rechargeTimer: 0, fuse: 1, trail: 0, trailLeft: 0, trailGap: 0.35 },
        atkSpeed: 1,
        manualWeapon: null,
        placedBombs: [],
        thrownBombs: [{
          startX: 0, startY: 0,
          targetX: 60, targetY: 0,
          duration: 0.3,
          t: 0.3,
          arcHeight: 24,
          bounce: 0.18,
          x: 0, y: 0, elevation: 0
        }],
        bombs: [],
        stats: { bombsPlaced: 0 },
        player: { x: 0, y: 0 },
        enemies: [],
        orbs: [],
        heals: [],
        elapsed: 0
      };
      RS.Systems.bomb(0.05, throwState);
      console.assert(throwState.thrownBombs.length === 0 && throwState.placedBombs.length === 1, 'Thrown bomb converts to placed bomb on landing');
    }
  };
  try { RS.Tests.run(); } catch (e) { console.warn('Self-tests error', e); }

  </script>
