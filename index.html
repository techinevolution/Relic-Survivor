<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Relic Survivor — Vortex r13 (Readable)</title>
  <style>
    :root { --panel:#0f172a; --text:#e5e7eb; --muted:#94a3b8; --border:#334155; }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      height:100%;
      background:#0a0f0a;
      color:var(--text);
      overflow:hidden;
      font:14px/1.3 ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial
    }
    .stage{
      position:relative;
      width:1280px;
      max-width:96vw;
      margin:12px auto;
      border:1px solid var(--border);
      border-radius:14px;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,.4);
      background:#000
    }
    canvas{display:block;width:1280px;max-width:96vw;height:auto;background:#000}
    .overlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center}
    .overlay.show{display:flex}
    .glass{background:rgba(0,0,0,.6);backdrop-filter:blur(2px);width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:16px}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:14px;width:min(980px,92vw)}
    .title{font-size:18px;color:#86efac;margin-bottom:8px;text-align:center}
    .levelup{font-size:16px;color:#e2e8f0;margin:-2px 0 8px 0;text-align:center}
    .grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
    .choice{padding:10px;border-radius:12px;background:#111827;border:1px solid var(--border);cursor:pointer;text-align:left}
    .choice:hover{border-color:#22d3ee;background:#0b1220}
    @media(max-width:1200px){.grid3{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="stage">
    <canvas id="game" width="1280" height="720"></canvas>
    <div id="levelModal" class="overlay">
      <div class="glass">
        <div class="card">
          <div class="title">Choose a Relic</div>
          <div id="levelUpLabel" class="levelup"></div>
          <div id="choices" class="grid3"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
  'use strict';

  // =====================================
  // RS Namespace
  // =====================================
const RS = {
  Config: {},
  Util: {},
  Registry: { Relics: {}, Enemies: {}, ICON: {}, Bestiary: [] },
  State: {},
  Systems: {},
  Render: {},
  UI: {},
  Tests: {}
};

  const TITLE_FONT = {

  const CODEX_DIM = { width: 860, height: 520 };
  const OPTIONS_PANEL_DIM = { width: 360, height: 240 };

  // =====================================
  // Audio
  // =====================================
  RS.Audio = {
    volume: 0.2,
    crossfade: 3,
    crossfadeLead: 8,
    playlist: [
      { id: 'arcade1', src: 'Assets/Audio/Music/background-music.mp3' },
      { id: 'arcade2', src: 'Assets/Audio/Music/background-music2.mp3' },
      { id: 'arcade3', src: 'Assets/Audio/Music/background-music3.mp3' },
      { id: 'arcade4', src: 'Assets/Audio/Music/background-music4.mp3' }
    ],
    menuTrackSrc: 'Assets/Audio/Music/background-music-title-menu.mp3',
    deathTrackSrc: 'Assets/Audio/SFX/Death/death_tune.mp3',
    sfxVolume: 0.15,
    sfxSources: {
      bomb_drop: 'Assets/Audio/SFX/Bomb/bomb_drop.mp3',
      bomb_exploding: 'Assets/Audio/SFX/Bomb/bomb_exploding.mp3',
      bomb_throw: 'Assets/Audio/SFX/Bomb/bomb_throw.mp3',
      boomerang_flight: 'Assets/Audio/SFX/Boomerang/boomerang_flight.mp3',
      boomerang_flight_reverse: 'Assets/Audio/SFX/Boomerang/boomerang_flight_reverse.mp3',
      boomerang_thump: 'Assets/Audio/SFX/Boomerang/boomerang_thump.mp3',
      bow_shot: 'Assets/Audio/SFX/Bow/bow_shot.mp3',
      arrow_thump: 'Assets/Audio/SFX/Bow/arrow_thump.mp3',
      lightning_bolt: 'Assets/Audio/SFX/Lightning/lightning_bolt.mp3',
      sword_swipe: 'Assets/Audio/SFX/Sword/sword_swipe.mp3',
      heart_pickup: 'Assets/Audio/SFX/Heart/heart_pickup.mp3',
      exp_pickup: 'Assets/Audio/SFX/Exp/exp_pickup.mp3'
    },
    tracks: {},
    sfx: {},
    activeTracks: [],
    queue: [],
    current: null,
    requestedMode: null,
    mode: null,
    canPlay: false,
    pendingMode: null,
    preparingNext: false,
    _tracksReady: false,
    root: null,
    autoplayTimer: null,
    deathActive: false,
    deathPlayed: false,
    wasGameOver: false,
    muffleFactor: 1,
    muffleLevel: 0.45,
    muffleResponse: 0.25,
    applyAttenuationToTrack(track) {
      if (!track || !track.audio) return;
      const att = typeof this.muffleFactor === 'number' ? this.muffleFactor : 1;
      track.audio.volume = Math.max(0, Math.min(1, track.volume * att));
    },
    applyAttenuationAll() {
      const seen = new Set();
      if (this.current) {
        this.applyAttenuationToTrack(this.current);
        seen.add(this.current);
      }
      this.activeTracks.forEach(track => {
        if (seen.has(track)) return;
        this.applyAttenuationToTrack(track);
      });
    },
    ensureRoot() {
      if (this.root) return this.root;
      let host = document.getElementById('rs-audio-root');
      if (!host) {
        host = document.createElement('div');
        host.id = 'rs-audio-root';
        host.style.display = 'none';
        (document.body || document.documentElement).appendChild(host);
      }
      this.root = host;
      return host;
    },
    attachToRoot(node) {
      if (!node) return;
      const attach = () => {
        const host = this.ensureRoot();
        if (host && !node.parentElement) host.appendChild(node);
      };
      if (document.body) attach();
      else document.addEventListener('DOMContentLoaded', attach, { once: true });
    },
    ensureSfx(id) {
      if (!id || this.sfx[id]) return this.sfx[id];
      const src = this.sfxSources[id];
      if (!src) return null;
      const audio = new Audio(src);
      audio.preload = 'auto';
      audio.loop = false;
      audio.volume = this.sfxVolume;
      audio.muted = false;
      audio.playsInline = true;
      this.attachToRoot(audio);
      const bank = { id, src, pool: [audio] };
      this.sfx[id] = bank;
      return bank;
    },
    playSfx(id, opts = {}) {
      if (!id) return null;
      this.ensureTracks();
      if (!this.canPlay) return null;
      const bank = this.ensureSfx(id);
      if (!bank) return null;
      let audio = bank.pool.find(a => a.paused);
      if (!audio) {
        audio = bank.pool[0].cloneNode();
        audio.volume = this.sfxVolume;
        audio.preload = 'auto';
        audio.loop = false;
        audio.muted = false;
        audio.playsInline = true;
        this.attachToRoot(audio);
        bank.pool.push(audio);
      }
      const volume = typeof opts.volume === 'number' ? opts.volume : this.sfxVolume;
      audio.loop = !!opts.loop;
      audio.currentTime = 0;
      audio.volume = volume;
      try {
        const playPromise = audio.play();
        if (playPromise && typeof playPromise.catch === 'function') {
          playPromise.catch(() => {});
        }
      } catch (err) {
        console.warn('SFX play blocked', err);
      }
      return audio;
    },
    stopSfx(audio) {
      if (!audio) return;
      try {
        audio.pause();
      } catch (err) {}
      audio.loop = false;
      try {
        audio.currentTime = 0;
      } catch (err) {}
    },
    pauseSfxLoop(audio) {
      if (!audio || audio.__rsLoopPaused) return;
      audio.__rsLoopPaused = true;
      try { audio.pause(); } catch (err) {}
    },
    resumeSfxLoop(audio) {
      if (!audio || !audio.__rsLoopPaused) return;
      audio.__rsLoopPaused = false;
      try {
        const playPromise = audio.play();
        if (playPromise && typeof playPromise.catch === 'function') playPromise.catch(() => {});
      } catch (err) {}
    },
    ensureTracks() {
      if (this._tracksReady) return;
      const makeTrack = (id, src, loop = false) => {
        const audio = new Audio(src);
        audio.preload = 'auto';
        audio.loop = loop;
        audio.volume = 0;
        audio.muted = true;
        audio.playsInline = true;
        this.attachToRoot(audio);
        const track = {
          id,
          src,
          audio,
          loop,
          volume: 0,
          targetVolume: 0,
          startVolume: 0,
          fadeDuration: 0,
          fadeElapsed: 0,
          stopOnZero: false
        };
        if (!loop) {
          audio.addEventListener('ended', () => {
            this.onTrackEnded(track);
          });
        }
        this.tracks[id] = track;
      };
      makeTrack('menu', this.menuTrackSrc, true);
      this.playlist.forEach(entry => makeTrack(entry.id, entry.src, false));
      if (this.deathTrackSrc) makeTrack('death', this.deathTrackSrc, false);
      Object.keys(this.sfxSources).forEach(id => this.ensureSfx(id));
      this._tracksReady = true;
    },
    resume() {
      this.ensureTracks();
      if (this.canPlay) return;
      this.canPlay = true;
      this.activeTracks.forEach(track => {
        if (track.audio.paused) this.safePlay(track);
      });
      if (this.pendingMode != null || this.requestedMode != null) {
        this.applyMode();
      } else if (!this.mode) {
        this.requestedMode = 'menu';
        this.applyMode();
      }
    },
    safePlay(track) {
      if (!this.canPlay || !track) return;
      try {
        const playPromise = track.audio.play();
        if (playPromise && typeof playPromise.catch === 'function') {
          playPromise.catch(() => {});
        }
      } catch (err) {
        console.warn('Audio play blocked', err);
      }
    },
    setFade(track, target, duration, stopOnZero = false) {
      if (!track) return;
      track.startVolume = track.volume;
      track.targetVolume = target;
      track.fadeDuration = Math.max(0.01, duration);
      track.fadeElapsed = 0;
      track.stopOnZero = stopOnZero;
      if (!this.activeTracks.includes(track)) this.activeTracks.push(track);
    },
    startTrack(track, opts = {}) {
      if (!track) return;
      const loop = !!opts.loop;
      const fadeIn = typeof opts.fadeIn === 'number' ? opts.fadeIn : this.crossfade;
      const fadeOut = typeof opts.fadeOut === 'number' ? opts.fadeOut : this.crossfade;
      const mode = opts.mode || (loop ? 'menu' : 'arcade');
      if (!this.canPlay) {
        this.pendingMode = this.requestedMode;
        return;
      }
      track.audio.loop = loop;
      track.loop = loop;
      track.audio.muted = false;
      track.audio.currentTime = 0;
      track.volume = 0;
      track.audio.volume = 0;
      this.safePlay(track);
      if (this.current && this.current !== track) {
        this.setFade(this.current, 0, fadeOut, true);
      }
      this.current = track;
      this.preparingNext = false;
      this.setFade(track, this.getDesiredVolume(), fadeIn, false);
      this.mode = mode;
    },
    shuffle(list) {
      for (let i = list.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [list[i], list[j]] = [list[j], list[i]];
      }
      return list;
    },
    getNextArcadeId() {
      if (!this.queue.length) {
        this.queue = this.shuffle(this.playlist.map(p => p.id).slice());
      }
      return this.queue.shift();
    },
    playNextArcade() {
      if (!this.canPlay) {
        this.pendingMode = 'arcade';
        return;
      }
      const nextId = this.getNextArcadeId();
      const track = this.tracks[nextId];
      this.startTrack(track, { loop: false });
    },
    startMenuTrack() {
      const track = this.tracks.menu;
      if (!track) return;
      this.startTrack(track, { loop: true, mode: 'menu' });
      this.queue = [];
    },
    startArcadePlaylist() {
      this.deathActive = false;
      this.queue = this.shuffle(this.playlist.map(p => p.id).slice());
      this.playNextArcade();
    },
    startDeathCue() {
      this.ensureTracks();
      const track = this.tracks.death;
      this.deathPlayed = true;
      if (!track) {
        this.deathActive = false;
        this.fadeOutAll();
        this.mode = 'death';
        return;
      }
      this.deathActive = true;
      const fade = Math.max(0.35, Math.min(1.1, this.crossfade));
      this.startTrack(track, { loop: false, mode: 'death', fadeIn: fade, fadeOut: fade });
    },
    fadeOutAll() {
      this.activeTracks.forEach(track => {
        this.setFade(track, 0, this.crossfade, true);
      });
      this.mode = 'none';
      this.current = null;
      this.deathActive = false;
    },
    attemptAutoplay() {
      this.ensureTracks();
      const tryPlay = () => {
        const track = this.tracks.menu;
        if (!track) return;
        track.audio.loop = true;
        track.loop = true;
        const promise = track.audio.play();
        if (promise && typeof promise.then === 'function') {
          promise.then(() => {
            if (this.autoplayTimer) {
              clearInterval(this.autoplayTimer);
              this.autoplayTimer = null;
            }
            this.canPlay = true;
            this.startMenuTrack();
          }).catch(() => {
            if (!this.autoplayTimer) {
              this.autoplayTimer = setInterval(tryPlay, 2000);
            }
          });
        } else {
          this.canPlay = true;
          this.startMenuTrack();
        }
      };
      tryPlay();
    },
    getDesiredVolume() {
      const st = typeof RS !== 'undefined' ? RS.State : null;
      if (st && st.settings && st.settings.musicMuted) return 0;
      return this.volume;
    },
    refreshVolumes() {
      this.ensureTracks();
      const target = this.getDesiredVolume();
      const fade = 0.4;
      if (this.current && !this.activeTracks.includes(this.current)) this.activeTracks.push(this.current);
      if (this.current) this.setFade(this.current, target, fade, false);
      this.activeTracks = Array.from(new Set(this.activeTracks));
      this.activeTracks.forEach(track => {
        if (track !== this.current) this.setFade(track, target, fade, false);
      });
      this.applyAttenuationAll();
    },
    onTrackEnded(track) {
      if (!track) return;
      if (!track.loop && this.activeTracks.includes(track)) {
        track.audio.pause();
        track.volume = 0;
        track.audio.volume = 0;
        const idx = this.activeTracks.indexOf(track);
        if (idx >= 0) this.activeTracks.splice(idx, 1);
      }
      if (track.id === 'death') {
        if (this.current === track) this.current = null;
        this.deathActive = false;
        return;
      }
      if (this.mode === 'arcade' && this.current === track) {
        this.current = null;
        this.preparingNext = false;
        this.playNextArcade();
      }
    },
    resolveMode(state) {
      if (!state) return 'menu';
      if (state.gameOver) {
        if (!this.deathPlayed || this.deathActive) return 'death';
        return 'none';
      }
      if (state.mode === 'playing' && state.gameplayMode === 'arcade') return 'arcade';
      return 'menu';
    },
    applyMode() {
      if (!this.canPlay) return;
      const desired = this.pendingMode != null ? this.pendingMode : this.requestedMode;
      if (!desired) {
        this.pendingMode = null;
        return;
      }
      if (desired === this.mode && (this.current || desired === 'none')) {
        this.pendingMode = null;
        return;
      }
      this.pendingMode = null;
      if (desired === 'arcade') {
        this.startArcadePlaylist();
      } else if (desired === 'menu') {
        this.startMenuTrack();
      } else if (desired === 'death') {
        this.startDeathCue();
      } else {
        this.fadeOutAll();
      }
    },
    updateTrack(track, dt) {
      if (!track) return false;
      if (track.fadeDuration && track.fadeDuration > 0) {
        track.fadeElapsed += dt;
        const frac = Math.min(1, track.fadeElapsed / track.fadeDuration);
        const newVol = track.startVolume + (track.targetVolume - track.startVolume) * frac;
        track.volume = Math.max(0, Math.min(this.volume, newVol));
        this.applyAttenuationToTrack(track);
        if (frac >= 1) {
          track.fadeDuration = 0;
          if (track.stopOnZero && track.targetVolume <= 0) {
            track.audio.pause();
            track.audio.currentTime = 0;
            track.volume = 0;
            track.audio.volume = 0;
            track.stopOnZero = false;
            if (this.current === track) this.current = null;
            return false;
          }
        }
      }
      if (!track.loop && track.audio.ended && track.volume <= 0.001) {
        return false;
      }
      return true;
    },
    update(state, dt) {
      this.ensureTracks();
      const shouldMuffle = !!(state && !state.gameOver && (state.paused || state.currentChoices));
      const targetMuffle = shouldMuffle ? this.muffleLevel : 1;
      const response = Math.max(0.01, this.muffleResponse || 0.2);
      const lerp = dt > 0 ? Math.min(1, dt / response) : 1;
      if (!Number.isFinite(this.muffleFactor)) this.muffleFactor = 1;
      const prevMuffle = this.muffleFactor;
      const nextMuffle = prevMuffle + (targetMuffle - prevMuffle) * lerp;
      this.muffleFactor = nextMuffle;
      if (this.canPlay && Math.abs(nextMuffle - prevMuffle) > 0.002) {
        this.applyAttenuationAll();
      }
      const prevGameOver = this.wasGameOver;
      const gameOver = !!(state && state.gameOver);
      if (gameOver && !prevGameOver) {
        this.deathActive = false;
        this.deathPlayed = false;
      } else if (!gameOver && prevGameOver) {
        this.deathActive = false;
        this.deathPlayed = false;
      }
      this.wasGameOver = gameOver;
      const desired = this.resolveMode(state);
      if (desired !== this.requestedMode) {
        this.requestedMode = desired;
        if (this.canPlay) this.applyMode();
      } else if (this.pendingMode != null && this.canPlay) {
        this.applyMode();
      }
      if (!this.canPlay) return;
      this.activeTracks = this.activeTracks.filter(track => this.updateTrack(track, dt));
      if (this.mode === 'arcade' && this.current && !this.current.loop) {
        const audio = this.current.audio;
        if (isFinite(audio.duration) && audio.duration > 0) {
          const remain = audio.duration - audio.currentTime;
          const lead = Math.max(this.crossfade + 1.5, Math.min(this.crossfadeLead, audio.duration * 0.5));
          if (!this.preparingNext && remain <= lead) {
            this.preparingNext = true;
            this.playNextArcade();
          }
        }
      } else if (this.mode === 'arcade' && !this.current && !this.preparingNext) {
        // Safeguard: if music was faded out (pause/level-up) and never restarted, kick the playlist back on.
        this.startArcadePlaylist();
      }
    }
  };

  const triggerAutoplay = () => {
    RS.Audio.ensureTracks();
    RS.Audio.requestedMode = RS.Audio.requestedMode || 'menu';
    RS.Audio.pendingMode = RS.Audio.pendingMode || 'menu';
    RS.Audio.attemptAutoplay();
    if (!RS.Audio.canPlay) {
      const resume = () => {
        RS.Audio.resume();
        document.removeEventListener('click', resume);
        document.removeEventListener('keydown', resume);
      };
      document.addEventListener('click', resume);
      document.addEventListener('keydown', resume);
    }
  };
  if (document.readyState === 'complete' || document.readyState === 'interactive') {
    setTimeout(triggerAutoplay, 0);
  } else {
    document.addEventListener('DOMContentLoaded', triggerAutoplay, { once: true });
  }

  // =====================================
  // Config
  // =====================================
  RS.Config = {
    W: 1280,
    H: 720,
    MAP: 8000,
    COLORS: {
      spinner: '#78b8ff',
      spinnerTrail: 'rgba(120,184,255,VAR)',
      bolt: 'rgba(120,70,220,VAR)',
      boltLinger: 'rgba(60,30,120,VAR)',
      xpBar: '#5cc9ff',
      hudBar: '#333',
      hudText: '#ddd',
      enemy: '#7c3131',
      enemyHP: '#a64',
      enemyHPBG: '#2b2b2b',
      border: '#233423',
      groundBase: '#4aa33f',
      groundShade: 'rgba(35,122,42,0.38)',
      groundHighlight: 'rgba(116,206,102,0.42)',
      groundDirt: '#3c7225',
      groundDirtLight: 'rgba(206,236,120,0.28)',
      grassPrimary: '#2f7f35',
      grassHighlight: '#a4f291',
      pebble: 'rgba(54,92,47,0.55)',
      treeLeaf: '#3f9d3f',
      treeLeafDark: '#28702d',
      treeHighlight: '#8be68f',
      treeTrunk: '#754a24',
      treeTrunkDark: '#4f3014'
    },
    BALANCE: {
      HIT_IFRAMES: 0.9,
      LEVELUP_IFRAMES: 0.45,
      DMG_PER_MIN: 0.12,
      XP_EPS: 1e-6,
      LEECH_APPLY_RATE: 0.4,
      MAX_HEALS_ON_FIELD: 3,
      BAT_START_S: 180,
      BAT_BASE_PERIOD_S: 12,
      BAT_MIN_PERIOD_S: 6,
      BAT_SURGE_S: 240,
      GOBLIN_START_S: 300,
      GOBLIN_BASE_PERIOD_S: 9,
      GOBLIN_MIN_PERIOD_S: 4,
      MAGNET_BASE: 60,
      MAGNET_RADIUS: [96, 132, 168, 210, 260]
    },
    ENEMIES: {

    clamp: (v, a, b) => Math.max(a, Math.min(b, v)),
    rnd: (a = 0, b = 1) => a + Math.random() * (b - a),
    dist2: (x1, y1, x2, y2) => {
      const dx = x2 - x1, dy = y2 - y1;
      return dx * dx + dy * dy;
    },
    now: () => performance.now() / 1000,
    fmtTime: (t) => {
      const m = Math.floor(t / 60);
      const s = Math.floor(t % 60);
      return `${m}:${String(s).padStart(2, '0')}`;
    },
    glyphAt(i, j) {
      const t = ((i * 73856093) ^ (j * 19349663)) >>> 0;
      const r = t % 100;
      return r < 14 ? '^' : '';
    },
    heartsLabel(value) {
      if (typeof value !== 'number' || !isFinite(value) || value <= 0) return '—';
      const halves = Math.round(value / 0.5);
      const full = Math.floor(halves / 2);
      const hasHalf = halves % 2 === 1;
      const parts = [];
      if (full > 0) parts.push(`${full} heart${full > 1 ? 's' : ''}`);
      if (hasHalf) parts.push('½ heart');
      return parts.join(' + ');
    },
    onScreen(x, y, st) {
      const { W, H } = RS.Config;
      const camX = st.player.x - W / 2;
      const camY = st.player.y - H / 2;
      return (
        x > camX - 20 && x < camX + W + 20 &&
        y > camY - 20 && y < camY + H + 20
      );
    },
    screenToWorld(mx, my, st) {
      const camX = st.player.x - RS.Config.W / 2;
      const camY = st.player.y - RS.Config.H / 2;
      const map = RS.Config.MAP;
      const worldX = camX + mx;
      const worldY = camY + my;
      return {
        x: Math.max(0, Math.min(map, worldX)),
        y: Math.max(0, Math.min(map, worldY))
      };
    }
  };

  function wrapLines(ctx, text, maxWidth) {
    if (!text) return [];
    const words = text.split(/\s+/);
    const lines = [];
    let line = '';
    for (const word of words) {
      const testLine = line ? `${line} ${word}` : word;
      if (ctx.measureText(testLine).width > maxWidth && line) {
        lines.push(line);
        line = word;
      } else {
        line = testLine;
      }
    }
    if (line) lines.push(line);
    return lines;
  }

  function drawWrappedText(ctx, text, x, y, maxWidth, lineHeight = 18) {
    const lines = wrapLines(ctx, text, maxWidth);
    lines.forEach((line, idx) => ctx.fillText(line, x, y + idx * lineHeight));
    if (!lines.length) return y;
    return y + (lines.length - 1) * lineHeight;
  }

  addEnemyKind({
    id: 'slime',
    make(s, opts) {
      const stats = RS.Config.ENEMIES.slime;
      return {
        type: 'slime',
        x: opts.x,
        y: opts.y,
        vx: 0,
        vy: 0,
        r: 9,
        speed: stats.speed,
        hp: stats.hp,
        maxHp: stats.hp,
        dmg: stats.damage,
        xp: stats.xp,
        splitTimer: 0,
        splitWarmup: stats.splitDelay ?? 0.75,
        splitting: false,
        splitDone: false,
        drawOffsetY: 0
      };
    },
    update(e, dt, s) {
      if (e.splitting) {
        if (e.splitTimer > 0) {
          e.splitTimer = Math.max(0, e.splitTimer - dt);
        }
        const base = e.splitWarmup || 0.75;
        const progress = base > 1e-6 ? 1 - (e.splitTimer / base) : 1;
        e._shakePhase = (e._shakePhase || 0) + dt * 18;
        const wobble = Math.sin(e._shakePhase) * 3.2 * progress;
        e.drawOffsetY = wobble;
        return;
      }
      const dx = s.player.x - e.x, dy = s.player.y - e.y, h = Math.hypot(dx, dy) || 1;
      e.vx = (dx / h) * e.speed;
      e.vy = (dy / h) * e.speed;
      e.x += e.vx * dt;
      e.y += e.vy * dt;
      e.drawOffsetY = 0;
    },
    draw(e, ctx, s) {
      ctx.save();
      ctx.fillStyle = 'rgba(12,20,28,0.45)';
      ctx.beginPath();
      ctx.ellipse(e.x, e.y + 6, 10, 4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      drawSpriteSlime(ctx, e.x, e.y - 2 + (e.drawOffsetY || 0), 0.78);
    }
  });

  addEnemyKind({
    id: 'slimeMini',
    make(s, opts) {
      const stats = RS.Config.ENEMIES.slimeMini;
      return {
        type: 'slimeMini',
        x: opts.x,
        y: opts.y,
        vx: 0,
        vy: 0,
        r: 6,
        speed: stats.speed,
        hp: stats.hp,
        maxHp: stats.hp,
        dmg: stats.damage,
        xp: stats.xp,
        wobble: Math.random() * Math.PI * 2,
        state: opts.state || 'chase',
        spawnStagger: opts.spawnStagger ?? 0,
        drawOffsetY: 0
      };
    },
    update(e, dt, s) {
      if (e.state === 'stagger') {
        e.spawnStagger = Math.max(0, e.spawnStagger - dt);
        e.wobble += dt * 5;
        e.drawOffsetY = Math.sin(e.wobble) * 2.5;
        if (e.spawnStagger <= 0) {
          e.state = 'chase';
          e.drawOffsetY = 0;
        }
        return;
      }
      e.wobble += dt * 3;
      const dx = s.player.x - e.x, dy = s.player.y - e.y, h = Math.hypot(dx, dy) || 1;
      const sway = Math.sin(e.wobble) * 0.35;
      e.vx = (dx / h) * e.speed + dy * 0.0 + sway * 20;
      e.vy = (dy / h) * e.speed + sway * 12;
      const len = Math.hypot(e.vx, e.vy) || 1;
      const scale = e.speed / len;
      e.vx *= scale;
      e.vy *= scale;
      e.x += e.vx * dt;
      e.y += e.vy * dt;
      e.drawOffsetY = Math.sin(e.wobble) * 1.6;
    },
    draw(e, ctx) {
      ctx.save();
      ctx.fillStyle = 'rgba(12,20,28,0.4)';
      ctx.beginPath();
      ctx.ellipse(e.x, e.y + 4, 7, 3, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      drawSpriteSlimePebble(ctx, e.x, e.y - 1 + (e.drawOffsetY || 0), 0.6);
    }
  });

  addEnemyKind({
    id: 'bat',
    make(s, opts) {
      const stats = RS.Config.ENEMIES.bat;
      return {
        type: 'bat', x: opts.x, y: opts.y, vx: 0, vy: 0, r: 8,
        speed: stats.speed, hp: stats.hp, maxHp: stats.hp, dmg: stats.damage,
        xp: stats.xp,
        state: 'chase', timer: 0, dirX: 0, dirY: 0
      };
    },
    update(e, dt, s) {
      if (e.state === 'chase') {
        const dx = s.player.x - e.x, dy = s.player.y - e.y, h = Math.hypot(dx, dy) || 1;
        e.vx = (dx / h) * e.speed;
        e.vy = (dy / h) * e.speed;
        e.x += e.vx * dt;
        e.y += e.vy * dt;
        if (RS.Util.onScreen(e.x, e.y, s) && Math.hypot(dx, dy) < 520) {
          e.state = 'charge';
          e.timer = 0.55;
          e.dirX = dx / h;
          e.dirY = dy / h;
        }
      } else if (e.state === 'charge') {
        e.timer -= dt;
        if (e.timer <= 0) {
          e.state = 'dash';
          e.timer = 0.35;
          e.vx = e.dirX * 380;
          e.vy = e.dirY * 380;
        }
      } else if (e.state === 'dash') {
        e.x += e.vx * dt;
        e.y += e.vy * dt;
        e.timer -= dt;
        if (e.timer <= 0) {
          e.state = 'recover';
          e.timer = 0.6;
        }
      } else if (e.state === 'recover') {
        e.timer -= dt;
        if (e.timer <= 0) e.state = 'chase';
      }
    },
    draw(e, ctx, s) {
      ctx.save();
      ctx.fillStyle = 'rgba(12,20,28,0.5)';
      ctx.beginPath();
      ctx.ellipse(e.x, e.y + 6, 9, 3, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      drawSpriteBat(ctx, e.x, e.y - 2, 0.8);
      if (e.state === 'charge') {
        const a = 0.5 + 0.5 * Math.sin(performance.now() / 80);
        ctx.strokeStyle = `rgba(252,211,77,${a})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(e.x, e.y - 4, 14, 0, Math.PI * 2);
        ctx.stroke();
      }
      if (e.state === 'dash') {
        ctx.strokeStyle = 'rgba(252,211,77,0.4)';
        ctx.lineWidth = 1.6;
        ctx.beginPath();
        ctx.moveTo(e.x - e.dirX * 14, e.y - e.dirY * 14);
        ctx.lineTo(e.x + e.dirX * 14, e.y + e.dirY * 14);
        ctx.stroke();
      }
    }
  });

  addEnemyKind({
    id: 'goblin',
    make(s, opts) {
      const stats = RS.Config.ENEMIES.goblin;
      const elite = !!(opts && opts.elite);
      const hp = stats.hp;
      const xp = stats.xp;
      const baseSpeed = elite ? stats.speed * 0.55 : stats.speed;
      return {
        type: 'goblin',
        x: opts.x,
        y: opts.y,
        vx: 0,
        vy: 0,
        r: 14,
        speed: baseSpeed,
        hp,
        maxHp: hp,
        dmg: stats.damage,
        xp,
        elite,
        jitter: Math.random() * Math.PI * 2,
        state: elite ? 'advance' : 'rush',
        fatigue: 0,
        windedTimer: 0,
        restTimer: 0,
        dirX: 0,
        dirY: 0,
        dirSet: false
      };
    },
    update(e, dt, s) {
      if (e.elite) {
        e.jitter += dt * 2;
        const dx = s.player.x - e.x, dy = s.player.y - e.y;
        const h = Math.hypot(dx, dy) || 1;
        const spd = e.speed;
        e.vx = (dx / h) * spd;
        e.vy = (dy / h) * spd;
        e.x += e.vx * dt;
        e.y += e.vy * dt;
        return;
      }

      if (e.state === 'rush') {
        e.jitter += dt * 6;
        if (!e.dirSet) {
          const dx = s.player.x - e.x, dy = s.player.y - e.y;
          const h = Math.hypot(dx, dy) || 1;
          e.dirX = dx / h;
          e.dirY = dy / h;
          e.dirSet = true;
        }
        const sway = Math.sin(e.jitter) * 0.2;
        const perpX = -e.dirY, perpY = e.dirX;
        e.vx = (e.dirX + perpX * sway) * e.speed;
        e.vy = (e.dirY + perpY * sway) * e.speed;
        e.x += e.vx * dt;
        e.y += e.vy * dt;
        const px = s.player.x, py = s.player.y;
        if ((px - e.x) * e.dirX + (py - e.y) * e.dirY < -25) {
          e.state = 'rest';
          e.restTimer = 1.4;
          e.dirSet = false;
        }
      } else if (e.state === 'rest') {
        e.jitter += dt * 3;
        e.vx = e.vy = 0;
        e.restTimer -= dt;
        if (e.restTimer <= 0) e.state = 'rush';
      }
    },
    draw(e, ctx) {
      ctx.save();
      ctx.fillStyle = 'rgba(10,20,10,0.45)';
      const sway = Math.sin(e.jitter * 0.6) * 0.4;
      ctx.beginPath();
      ctx.ellipse(e.x + sway, e.y + 6, e.elite ? 11 : 9, e.elite ? 3.8 : 3.2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      const bob = (!e.elite && e.state === 'rest') ? 0.6 * Math.sin(e.jitter * 1.3) : 0;
      const scale = e.elite ? 1.6 : 1.4;
      drawSpriteGoblin(ctx, e.x + sway, e.y - 2 + bob, scale);
    }
  });

  // =====================================
  // Systems
  // =====================================
  RS.Systems = {
    timeScale(s) { return 1 + (s.elapsed / 60) * RS.Config.BALANCE.DMG_PER_MIN; },
    roundDamage(value) {
      if (!Number.isFinite(value)) return 0;
      return Math.max(0, Math.floor(value + 0.5));
    },
    effDamage(base, s) {
      const scaled = base * s.player.damageMult;
      return this.roundDamage(scaled);
    },
    weaponAvailable(s, weapon) {
      switch (weapon) {
        case 'boomerang': return true;
        case 'sword': return !!s.sword.enabled;
        case 'bow': return !!s.bow.enabled;
        case 'storm': return !!s.storm.enabled;
        case 'bomb': return !!s.bomb.enabled;
        case 'spinner': return s.spinner.rings.length > 0;
        default: return false;
      }
    },
    isEnemyTargetable(e) {
      return !!(e && e.hp > 0 && !(e.type === 'slime' && e.splitting));
    },
    manualEligible(weapon) {
      return [ 'boomerang', 'sword', 'bow', 'storm', 'bomb', 'spinner' ].includes(weapon);
    },
    manualReady(s, weapon) {
      switch (weapon) {
        case 'sword': return s.sword.enabled && (s.sword.timer || 0) <= 0.001;
        case 'bow': return s.bow.enabled && (s.bow.timer || 0) <= 0.001;
        case 'storm': return s.storm.enabled && (s.storm.timer || 0) <= 0.001;
        case 'bomb': return s.bomb.enabled && (s.bomb.ammo || 0) > 0;
        case 'boomerang': return (s.boomerang.ammo || 0) > 0;
        case 'spinner': return this.spinnerBladeCount(s) > 0;
        default: return false;
      }
    },
    spinnerBladeCount(s) {
      if (!s || !Array.isArray(s.spinner?.rings)) return 0;
      return s.spinner.rings.reduce((sum, ring) => sum + Math.max(0, ring.count || 0), 0);
    },
    setManualWeaponBySlot(s, slotIdx) {
      if (!s || !Array.isArray(s.weaponSlots)) return;
      if (slotIdx < 0 || slotIdx >= s.weaponSlots.length) return;
      const weapon = s.weaponSlots[slotIdx];
      if (!weapon) return;
      if (!this.manualEligible(weapon)) return;
      if (!this.weaponAvailable(s, weapon)) return;
      this.setManualWeapon(s, weapon);
    },
    fireSpinnerShot(s, target) {
      if (!target || !s || !Array.isArray(s.spinner?.rings) || !s.spinner.rings.length) return false;
      const ringIndex = s.spinner.rings.findIndex(r => (r.count || 0) > 0);
      if (ringIndex === -1) return false;
      const ring = s.spinner.rings[ringIndex];
      if (!ring.count || ring.count <= 0) return false;
      ring.count = Math.max(0, ring.count - 1);
      const dx = target.x - s.player.x;
      const dy = target.y - s.player.y;
      const dist = Math.max(16, Math.hypot(dx, dy) || 1);
      const speed = RS.Config.WEAPONS.spinner.shotSpeed || 520;
      const maxRange = s.boomerang?.range || RS.Config.WEAPONS.boomerang.range || 320;
      const shot = {
        x: s.player.x,
        y: s.player.y,
        dirX: dx / dist,
        dirY: dy / dist,
        speed,
        travelled: 0,
        outDistance: maxRange,
        returning: false,
        ringIndex,
        radius: 12,
        hitsOut: new WeakSet(),
        hitsIn: new WeakSet()
      };
      if (!Array.isArray(s.spinner.shots)) s.spinner.shots = [];
      s.spinner.shots.push(shot);
      return true;
    },
    updateSpinnerShots(dt, s) {
      if (!Array.isArray(s.spinner?.shots) || !s.spinner.shots.length) return;
      for (let i = s.spinner.shots.length - 1; i >= 0; i--) {
        const shot = s.spinner.shots[i];
        const baseSpeed = shot.speed || 520;
        if (!shot.returning) {
          const step = baseSpeed * dt;
          shot.x += shot.dirX * step;
          shot.y += shot.dirY * step;
          shot.travelled = (shot.travelled || 0) + step;
          if (shot.travelled >= (shot.outDistance || 0)) {
            shot.returning = true;
          }
        } else {
          const dx = s.player.x - shot.x;
          const dy = s.player.y - shot.y;
          const dist = Math.hypot(dx, dy) || 1;
          shot.dirX = dx / dist;
          shot.dirY = dy / dist;
          const step = baseSpeed * dt;
          shot.x += shot.dirX * step;
          shot.y += shot.dirY * step;
          if (dist <= 16) {
            const ring = s.spinner.rings[shot.ringIndex];
            if (ring) ring.count = Math.min((ring.count || 0) + 1, s.spinner.maxBlades || 5);
            s.spinner.shots.splice(i, 1);
            continue;
          }
        }
        const hitSet = shot.returning ? shot.hitsIn : shot.hitsOut;
        for (let j = s.enemies.length - 1; j >= 0; j--) {
          const e = s.enemies[j];
          if (hitSet.has(e)) continue;
          if (RS.Util.dist2(shot.x, shot.y, e.x, e.y) < (shot.radius + e.r) ** 2) {
            RS.Systems.applyDamage(e, RS.Systems.effDamage(s.spinner.dmg, s), s, 'spinnerShot');
            hitSet.add(e);
          }
        }
      }
    },
    updateBoomerangProfile(s) {
      const rank = Math.max(1, s.levels.boomerang || 1);
      const countByRank = [1, 2, 3, 4, 5, 6];
      s.boomerang.count = countByRank[Math.min(rank - 1, countByRank.length - 1)];
      s.boomerang.maxAmmo = s.boomerang.count;
      const inFlight = Array.isArray(s.boomerangs) ? s.boomerangs.length : 0;
      const readySlots = Math.max(0, s.boomerang.maxAmmo - inFlight);
      s.boomerang.ammo = readySlots;
      s.boomerang.damage = RS.Config.WEAPONS.boomerang.baseDamage;
      const baseCooldown = 0.75;
      const cooldownStep = 0.06;
      s.boomerang.cooldown = Math.max(0.35, baseCooldown - (rank - 1) * cooldownStep);
      const augmentRank = s.levels.hook ?? 0;
      const augmentStep = 6;
      s.boomerang.collectRadius = 18 + augmentRank * augmentStep;
      const tempoRank = s.levels.tempo || 0;
      const speedBase = RS.Config.WEAPONS.boomerang.baseSpeed ?? 230;
      const speedMult = tempoRank > 0 ? Math.pow(1.1, tempoRank) : 1;
      s.boomerang.speed = speedBase * speedMult;
    },
    ensureWeaponSlots(s) {
      if (!Array.isArray(s.weaponSlots) || s.weaponSlots.length !== 6) {
        s.weaponSlots = [ 'boomerang', null, null, null, null, null ];
      }
    },
    addWeaponToSlots(s, weapon) {
      this.ensureWeaponSlots(s);
      if (s.weaponSlots.includes(weapon)) return;
      for (let i = 0; i < s.weaponSlots.length; i++) {
        if (!s.weaponSlots[i]) { s.weaponSlots[i] = weapon; return; }
      }
    },
    setManualWeapon(s, weapon) {
      if (!weapon || !this.manualEligible(weapon) || !this.weaponAvailable(s, weapon)) return;
      if (s.manualWeapon === weapon) return;
      s.manualWeapon = weapon;
      if (s.manualAim && s.manualAim.weapon !== weapon) s.manualAim = null;
    },
    setControlMode(s, mode, opts = {}) {
      const next = mode === 'manual' ? 'manual' : 'auto';
      const settings = s.settings || (s.settings = {});
      if (!settings.controlModes) {
        settings.controlModes = { arcade: 'auto', adventure: 'manual' };
      }

    onDamage(dealt, s, source) {

    applyDamage(e, d, s, source = 'generic') {
      if (!e || typeof e.hp !== 'number' || d <= 0) return 0;
      if (e.hp <= 0) return 0;
      if (e.type === 'slime' && e.splitting) return 0;
      const prevHp = e.hp;
      const dealt = Math.min(d, prevHp);
      e.hp -= d;
      if (e.type === 'slime' && !e.splitting) {
        const baseline = e.maxHp || prevHp || RS.Config.ENEMIES.slime.hp || 12;
        const threshold = baseline * 2;
        const rawDamage = Math.floor(d + 1e-6);
        if (prevHp >= baseline && rawDamage >= threshold) {
          e.suppressSplit = true;
          e.hp = Math.min(e.hp, 0);
        }
      }
      this.onDamage(dealt, s, source);
      return dealt;

    updateLeech(dt, s) {

      const apply = Math.min(s.leechPool, L * dt, s.player.maxHearts - s.player.hearts);

      s.player.hearts = Math.min(s.player.maxHearts, Math.round(s.player.hearts * 4) / 4);

    spawnAtEdge(s) {

      else if (side < 0.5) { x = px + (W / 2 + margin); y = py + RS.Util.rnd(-H / 2 - margin, H / 2 + margin); }
      else if (side < 0.75) { x = px + RS.Util.rnd(-W / 2 - margin, W / 2 + margin); y = py - (H / 2 + margin); }
      else { x = px + RS.Util.rnd(-W / 2 - margin, W / 2 + margin); y = py + (H / 2 + margin); }

      }

          const p = this.spawnAtEdge(s);
          const surge = s.elapsed >= RS.Config.BALANCE.BAT_SURGE_S;
          const group = surge ? 16 : 8;
          for (let g = 0; g < group; g++) {
            const ang = (Math.PI * 2 * g) / group + Math.random() * 0.5;
            const dist = 28 + Math.random() * 28;
            const bx = RS.Util.clamp(p.x + Math.cos(ang) * dist, 8, RS.Config.MAP - 8);

            s.enemies.push(RS.Registry.Enemies.bat.make(s, { x: bx, y: by }));
          }
          const ramp = Math.min(6, Math.max(0, (s.elapsed - RS.Config.BALANCE.BAT_START_S) / 120 * 2));
          const surgeBonus = surge ? 4 : 0;
          const surgeFactor = surge ? 0.6 : 1;
          s.batTimer = Math.max(minP * surgeFactor, (base - ramp - surgeBonus) * surgeFactor);

        const ringCount = 36;
        const radius = 440;
        const margin = radius + 16;
        const cx = RS.Util.clamp(s.player.x, margin, RS.Config.MAP - margin);
        const cy = RS.Util.clamp(s.player.y, margin, RS.Config.MAP - margin);
        for (let g = 0; g < ringCount; g++) {
          const ang = (Math.PI * 2 * g) / ringCount;
          const gx = RS.Util.clamp(cx + Math.cos(ang) * radius, 14, RS.Config.MAP - 14);
          const gy = RS.Util.clamp(cy + Math.sin(ang) * radius, 14, RS.Config.MAP - 14);
          s.enemies.push(RS.Registry.Enemies.goblin.make(s, { x: gx, y: gy, elite: true }));
        }
        s.goblinAmbushDone = true;

      }

          const p = this.spawnAtEdge(s);

          if (s.elapsed >= RS.Config.BALANCE.GOBLIN_START_S + 60) count += 2;

            const gy = RS.Util.clamp(p.y + Math.sin(ang) * dist, 10, RS.Config.MAP - 10);
            s.enemies.push(RS.Registry.Enemies.goblin.make(s, { x: gx, y: gy }));
          }
          const ramp = Math.min(6, Math.max(0, (s.elapsed - RS.Config.BALANCE.GOBLIN_START_S) / 120 * 2));

    input(dt, s) {
      const k = s.keys;
      const up = k['w'] || k['arrowup'], down = k['s'] || k['arrowdown'], left = k['a'] || k['arrowleft'], right = k['d'] || k['arrowright'];
      let ax = 0, ay = 0;
      if (up) ay -= 1; if (down) ay += 1; if (left) ax -= 1; if (right) ax += 1;
      const len = Math.hypot(ax, ay);
      if (len > 0) {
        ax /= len;
        ay /= len;
        s.player.facing = Math.atan2(ay, ax);
      } else {
        ax = 0;
        ay = 0;
      }
      s.player.vx = ax * s.player.baseSpeed;
      s.player.vy = ay * s.player.baseSpeed;
      s.player.x = RS.Util.clamp(s.player.x + s.player.vx * dt, 0, RS.Config.MAP);
      s.player.y = RS.Util.clamp(s.player.y + s.player.vy * dt, 0, RS.Config.MAP);
      s.stats.distance += Math.hypot(s.player.vx, s.player.vy) * dt;
    },
    enemies(dt, s) {
      const reg = RS.Registry.Enemies;
      for (let i = s.enemies.length - 1; i >= 0; i--) {
        const e = s.enemies[i];
        reg[e.type].update(e, dt, s);
        const rr = (e.r + s.player.r) ** 2;
        if (RS.Util.dist2(e.x, e.y, s.player.x, s.player.y) < rr) {
          if (!RS.State.devInvulnerable && s.player.iFrames <= 0) {
            const dmgHearts = typeof e.dmg === 'number' ? e.dmg : 1;
            s.player.hearts = Math.max(0, s.player.hearts - dmgHearts);
            s.player.hearts = Math.max(0, Math.round(s.player.hearts * 4) / 4);
            s.player.iFrames = RS.Config.BALANCE.HIT_IFRAMES;
            if (s.player.hearts <= 0) RS.Systems.onDeath(s);
          }
          const drr = Math.sqrt(rr) || 1;
          e.x += (e.x - s.player.x) / drr * 40 * dt;
          e.y += (e.y - s.player.y) / drr * 40 * dt;
        }
      }
    },
    spawnBoomerang(s, opts = {}) {

        orbitRadius: 0,

        spinAngle: 0,
        spinSpeed: (Math.random() < 0.5 ? -1 : 1) * 18,
        manual: !!opts.manual,
        born: s.elapsed,
        hitEnemies: 0,
        sfxFlight: null,
        sfxReverse: null
      };
      const boomVol = RS.Audio.sfxVolume * 0.64;
      boomerang.sfxFlight = RS.Audio.playSfx('boomerang_flight', { loop: true, volume: boomVol });

    stopBoomerangAudio(b) {

    haltBoomerangs(s, opts = {}) {

      if (opts.clear) s.boomerangs.length = 0;

    syncBoomerangAudio(s) {
      if (!s || !Array.isArray(s.boomerangs)) return;
      const shouldPause = !!(s.paused || s.currentChoices);
      s.boomerangs.forEach(b => {
        if (shouldPause) {
          RS.Audio.pauseSfxLoop(b.sfxFlight);

    pickBoomerangTargets(s, count) {
      const results = [];
      const player = s.player;
      const enemies = s.enemies
        .filter(RS.Systems.isEnemyTargetable)
        .sort((a, b) => RS.Util.dist2(a.x, a.y, player.x, player.y) - RS.Util.dist2(b.x, b.y, player.x, player.y));
      while (enemies.length && results.length < count) {
        const enemy = enemies.shift();
        results.push({ x: enemy.x, y: enemy.y });
      }
      if (results.length < count) {
        const orbs = [...s.orbs].sort((a, b) => RS.Util.dist2(a.x, a.y, player.x, player.y) - RS.Util.dist2(b.x, b.y, player.x, player.y));
        while (orbs.length && results.length < count) {
          const orb = orbs.shift();
          results.push({ x: orb.x, y: orb.y });
        }
      }
      if (results.length < count) {
        const baseAngle = s.boomerangAngle || 0;
        const remaining = count - results.length;
        for (let i = 0; i < remaining; i++) {
          const ang = baseAngle + (Math.PI * 2 * (results.length + i)) / Math.max(1, count);
          results.push({ angle: ang });
        }
        s.boomerangAngle = baseAngle + Math.PI / 5;
      }
      return results.slice(0, count);

    boomerang(dt, s) {
      const data = s.boomerang;
      const manualMode = s.controlMode === 'manual' && s.manualWeapon === 'boomerang';
      const capacity = Math.max(0, data.maxAmmo || 0);
      const inFlight = s.boomerangs.length;
      if (capacity > 0 && inFlight > capacity) {
        data.ammo = Math.max(0, capacity - inFlight);
      }
      if (manualMode) {
        const cmd = this.takeManualCommand(s, 'boomerang');
        if (cmd && data.ammo > 0) {
          data.ammo--;
          this.spawnBoomerang(s, { target: { x: cmd.x, y: cmd.y }, manual: true });
        }
      } else if (data.ammo > 0 && inFlight < capacity) {
        const tgt = this.pickBoomerangTargets(s, 1)[0];
        data.ammo--;
        if (tgt && typeof tgt.angle === 'number' && !tgt.x) this.spawnBoomerang(s, { angle: tgt.angle });
        else if (tgt) this.spawnBoomerang(s, { target: tgt });
        else this.spawnBoomerang(s, {});
      }
      const startReturn = (b) => {
        if (b.stage === 'return') return;
        b.stage = 'return';
        const dx = b.x - s.player.x;
        const dy = b.y - s.player.y;
        b.orbitRadius = Math.max(48, Math.hypot(dx, dy));
        b.orbitAngle = Math.atan2(dy, dx);
        if (!b.hasLeftPlayer) b.hasLeftPlayer = true;
      };
      for (let i = s.boomerangs.length - 1; i >= 0; i--) {
        const b = s.boomerangs[i];
        const prevX = b.x;
        const prevY = b.y;

        if (b.stage === 'out') {
          const step = b.speed * dt;
          b.x += b.vx * step;
          b.y += b.vy * step;
          b.distance += step;
          b.heading = Math.atan2(b.vy, b.vx);
        } else {
          const prevRadius = b.orbitRadius || Math.hypot(prevX - s.player.x, prevY - s.player.y);
          const shrink = b.speed * 0.7 * dt;
          b.orbitRadius = Math.max(12, prevRadius - shrink);
          const angSpeed = b.speed / Math.max(prevRadius, 40);
          b.orbitAngle += b.arcDir * angSpeed * dt * 1.4;
          b.x = s.player.x + Math.cos(b.orbitAngle) * b.orbitRadius;
          b.y = s.player.y + Math.sin(b.orbitAngle) * b.orbitRadius;
        }

        const dxStep = b.x - prevX;
        const dyStep = b.y - prevY;
        if (!Number.isFinite(b.heading) && (dxStep || dyStep)) {
          b.heading = Math.atan2(dyStep, dxStep);
        } else if (b.stage === 'return') {
          b.heading = Math.atan2(dyStep, dxStep);
        }
        b.spinAngle = (b.spinAngle || 0) + (b.spinSpeed || 0) * dt;

        for (let j = s.enemies.length - 1; j >= 0; j--) {
          const e = s.enemies[j];

    sword(dt, s) {

          angle,
          reach: sw.reach,
          arc,
          start,
          end,
          span: end - start,

    storm(dt, s) {

          anyHit = true;

          RS.Systems.applyDamage(target, RS.Systems.effDamage(s.storm.dmg, s), s, 'storm');

          if (chainsLeft <= 0) continue;
          const pool = s.enemies.filter(e => !visited.has(e));

          const next = nearestEnemyTo(target.x, target.y, pool, 240);

          if (s.storm.forkChance > 0 && Math.random() < s.storm.forkChance) {
